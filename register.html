<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Jisajili - MR. HAULE ORGANIZATION</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="progress-bar" id="progressBar"></div>
<canvas id="particles-bg"></canvas>

<header class="header">
    <div class="header-content">
        <div class="logo">
            <img src="images/logo.png" alt="Logo" id="logoImg" onerror="this.src='https://via.placeholder.com/60x60?text=HA'">
            <h1>MR. HAULE <span style="color:#00ffff;">ORGANIZATION</span></h1>
        </div>
        <nav class="nav-menu">
            <a href="index.html" data-key="home">Nyumbani</a>
            <a href="login.html" data-key="login">Ingia</a>
            <a href="register.html" data-key="register">Jisajili</a>
        </nav>
        <div class="lang-switch">
            <button class="lang-btn active" data-lang="sw">SW</button>
            <button class="lang-btn" data-lang="en">EN</button>
        </div>
    </div>
</header>

<main>
    <div class="glass-container" style="max-width: 500px;">
        <h2 style="text-align: center; margin-bottom: 10px;" data-key="registerTitle">📝 Jisajili Sasa</h2>
        <p style="text-align: center; margin-bottom: 30px; color: rgba(255,255,255,0.7);" data-key="registerSub">
            Jaza taarifa zako kwa usahihi
        </p>

        <!-- Step Indicators -->
        <div class="step-indicator">
            <div class="step active" id="step1">1</div>
            <div class="step" id="step2">2</div>
            <div class="step" id="step3">3</div>
            <div class="step" id="step4">4</div>
        </div>

        <!-- Form Steps -->
        <form id="registerForm">
            <!-- STEP 1: Gender -->
            <div class="form-step active-step" id="step1Form">
                <h3 data-key="genderQuestion">Jinsia yako ni?</h3>
                <select id="gender" required style="width: 100%; padding: 14px; margin: 20px 0; background: rgba(255,255,255,0.1); border-radius: 16px; color: #fff;">
                    <option value="" disabled selected>-- Chagua Jinsia --</option>
                    <option value="Male">Me (Mwanaume)</option>
                    <option value="Female">Ke (Mwanamke)</option>
                    <option value="Other">Nyingine</option>
                </select>
                <button type="button" class="btn btn-primary" onclick="nextStep(2)" data-key="next">Inayofuata →</button>
            </div>

            <!-- STEP 2: Email & Phone -->
            <div class="form-step" id="step2Form">
                <h3 data-key="contactInfo">Mawasiliano</h3>
                <input type="email" id="email" placeholder="Barua pepe (Email)" required>
                <input type="tel" id="phone" placeholder="Namba ya simu (WhatsApp)" required>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="button" class="btn btn-secondary" onclick="prevStep(1)">← Nyuma</button>
                    <button type="button" class="btn btn-primary" onclick="nextStep(3)">Inayofuata →</button>
                </div>
            </div>

            <!-- STEP 3: Full Name -->
            <div class="form-step" id="step3Form">
                <h3 data-key="nameQuestion">Jina lako kamili?</h3>
                <input type="text" id="fullName" placeholder="Mfano: Amani Erasmuce Haule" required>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="button" class="btn btn-secondary" onclick="prevStep(2)">← Nyuma</button>
                    <button type="button" class="btn btn-primary" onclick="nextStep(4)">Inayofuata →</button>
                </div>
            </div>

            <!-- STEP 4: Password & Confirm -->
            <div class="form-step" id="step4Form">
                <h3 data-key="passwordQuestion">Weka Nenosiri</h3>
                <input type="password" id="password" placeholder="Nenosiri (angalau herufi 6)" required>
                <input type="password" id="confirmPassword" placeholder="Thibitisha nenosiri" required>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="button" class="btn btn-secondary" onclick="prevStep(3)">← Nyuma</button>
                    <button type="submit" class="btn btn-primary" data-key="registerBtn">Jisajili ✓</button>
                </div>
            </div>
        </form>

        <p style="text-align: center; margin-top: 20px;">
            <a href="login.html" style="color: #00ffff;" data-key="haveAccount">Tayari una akaunti? Ingia hapa</a>
        </p>
    </div>
</main>

<footer class="footer">
    <div class="copyright">
        &copy; 2026 MR. HAULE ORGANIZATION. All Rights Reserved.
    </div>
</footer>

<script src="firebase-config.js"></script>
<script>
    // Step navigation
    let currentStep = 1;
    const totalSteps = 4;

    function updateSteps() {
        for(let i = 1; i <= totalSteps; i++) {
            const stepDiv = document.getElementById(`step${i}`);
            const formDiv = document.getElementById(`${i}Form`);
            if(i < currentStep) {
                stepDiv.classList.add('completed');
                stepDiv.classList.remove('active');
            } else if(i === currentStep) {
                stepDiv.classList.add('active');
                stepDiv.classList.remove('completed');
                if(formDiv) formDiv.classList.add('active-step');
            } else {
                stepDiv.classList.remove('active', 'completed');
                if(formDiv) formDiv.classList.remove('active-step');
            }
        }
    }

    function nextStep(step) {
        // Validate current step
        if(currentStep === 1) {
            const gender = document.getElementById('gender').value;
            if(!gender) {
                showToast('Tafadhali chagua jinsia yako', 'error');
                return;
            }
        }
        if(currentStep === 2) {
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            if(!email || !phone) {
                showToast('Tafadhali jaza barua pepe na namba ya simu', 'error');
                return;
            }
            if(!email.includes('@')) {
                showToast('Barua pepe sio sahihi', 'error');
                return;
            }
        }
        if(currentStep === 3) {
            const name = document.getElementById('fullName').value;
            if(!name || name.length < 3) {
                showToast('Tafadhali andika jina lako kamili', 'error');
                return;
            }
        }
        currentStep = step;
        updateSteps();
    }

    function prevStep(step) {
        currentStep = step;
        updateSteps();
    }

    function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // Handle registration
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const gender = document.getElementById('gender').value;
        const email = document.getElementById('email').value;
        const phone = document.getElementById('phone').value;
        const fullName = document.getElementById('fullName').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if(password !== confirmPassword) {
            showToast('Nenosiri hazilingani!', 'error');
            return;
        }

        if(password.length < 6) {
            showToast('Nenosiri lazima iwe na herufi 6 au zaidi', 'error');
            return;
        }

        // Show loading
        const btn = document.querySelector('#registerForm button[type="submit"]');
        const originalText = btn.textContent;
        btn.textContent = '⏳ Inasajili...';
        btn.disabled = true;

        try {
            const auth = window.firebase.auth;
            const database = window.firebase.database;
            const { createUserWithEmailAndPassword } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js");
            const { ref, set } = window.firebase;
            
            // Create user in Firebase Auth
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;
            
            // Save additional data to Realtime Database
            await set(ref(database, `users/${user.uid}`), {
                fullName: fullName,
                email: email,
                phone: phone,
                gender: gender,
                role: 'user',
                createdAt: new Date().toISOString()
            });
            
            showToast('✅ Usajili umefanikiwa! Unaelekezwa kwenye dashboard...');
            
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 2000);
            
        } catch (error) {
            console.error(error);
            let errorMessage = 'Usajili umeshindwa. Jaribu tena.';
            if(error.code === 'auth/email-already-in-use') {
                errorMessage = 'Barua pepe hii tayari imesajiliwa!';
            } else if(error.code === 'auth/invalid-email') {
                errorMessage = 'Barua pepe sio sahihi!';
            } else if(error.code === 'auth/weak-password') {
                errorMessage = 'Nenosiri ni dhaifu! Tumia angalau herufi 6.';
            }
            showToast(errorMessage, 'error');
        } finally {
            btn.textContent = originalText;
            btn.disabled = false;
        }
    });

    // Language translations
    const translations = {
        sw: {
            home: 'Nyumbani', login: 'Ingia', register: 'Jisajili',
            registerTitle: '📝 Jisajili Sasa', registerSub: 'Jaza taarifa zako kwa usahihi',
            genderQuestion: 'Jinsia yako ni?', next: 'Inayofuata →', back: '← Nyuma',
            contactInfo: 'Mawasiliano', nameQuestion: 'Jina lako kamili?',
            passwordQuestion: 'Weka Nenosiri', registerBtn: 'Jisajili ✓',
            haveAccount: 'Tayari una akaunti? Ingia hapa'
        },
        en: {
            home: 'Home', login: 'Login', register: 'Register',
            registerTitle: '📝 Register Now', registerSub: 'Fill in your details correctly',
            genderQuestion: 'What is your gender?', next: 'Next →', back: '← Back',
            contactInfo: 'Contact Information', nameQuestion: 'Your full name?',
            passwordQuestion: 'Set Password', registerBtn: 'Register ✓',
            haveAccount: 'Already have an account? Login here'
        }
    };

    let currentLang = 'sw';
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            currentLang = btn.dataset.lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.dataset.key;
                if(translations[currentLang][key]) el.textContent = translations[currentLang][key];
            });
        });
    });

    // Particle background
    const canvas = document.getElementById('particles-bg');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let particles = [];
    for(let i = 0; i < 50; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            radius: Math.random() * 3 + 1,
            speedX: (Math.random() - 0.5) * 0.5,
            speedY: (Math.random() - 0.5) * 0.5
        });
    }
    function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'rgba(0, 255, 255, 0.5)';
        particles.forEach(p => {
            p.x += p.speedX;
            p.y += p.speedY;
            if(p.x < 0) p.x = canvas.width;
            if(p.x > canvas.width) p.x = 0;
            if(p.y < 0) p.y = canvas.height;
            if(p.y > canvas.height) p.y = 0;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fill();
        });
        requestAnimationFrame(animateParticles);
    }
    animateParticles();
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    // Progress bar
    window.addEventListener('scroll', () => {
        const winScroll = document.documentElement.scrollTop;
        const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        const scrolled = (winScroll / height) * 100;
        document.getElementById('progressBar').style.width = scrolled + '%';
    });
</script>
</body>
</html>
