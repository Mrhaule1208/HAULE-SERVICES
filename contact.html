<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f0f9ff; }
        .dark body { background: #0f172a; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index:1000; }
        .modal.active { display: flex; }
        .modal-3d { background:#1E3A8A; color:white; border-radius:24px; padding:24px; max-width:400px; text-align:center; box-shadow:0 25px 40px rgba(0,0,0,0.4); }
    </style>
</head>
<body>
    <!-- Header and nav same as index -->
    <div class="text-center pt-8 pb-2"><div class="flex justify-center items-center space-x-3"><img src="images/1000096560.jpg" class="h-16 w-auto rounded-xl shadow-lg"><span class="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-800 to-blue-400">MR. HAULE SERVICES 26/27</span></div></div>
    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-blue-200 shadow-sm"><div class="container mx-auto px-4 py-3 flex justify-center space-x-6 md:space-x-10"><a href="index.html" class="font-semibold text-blue-700">Nyumbani</a><a href="index.html#services" class="font-semibold text-blue-700">Huduma Zetu</a><a href="blog.html" class="font-semibold text-blue-700">Blog</a><a href="apply.html" class="font-semibold text-blue-700">Omba Huduma</a><a href="contact.html" class="font-semibold text-blue-600">Mawasiliano</a><a href="about.html" class="font-semibold text-blue-700">Kuhusu Sisi</a></div></nav>

    <section class="py-16 bg-gray-50 dark:bg-gray-800">
        <div class="container mx-auto px-4 md:px-6">
            <h1 class="text-3xl font-bold text-center text-blue-800 dark:text-white mb-12">Wasiliana Nasi</h1>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                <div class="space-y-6">
                    <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-lg p-6 flex items-center space-x-4"><i class="fas fa-phone-alt text-2xl text-blue-600"></i><div><h3 class="font-bold">Simu / WhatsApp</h3><p>+255 625 568 661</p><p>+255 692 584 825</p><p>+255 745 014 719</p><p>+255 656 278 661</p></div></div>
                    <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-lg p-6 flex items-center space-x-4"><i class="fas fa-envelope text-2xl text-blue-600"></i><div><h3 class="font-bold">Barua Pepe</h3><p>info@mrhaule.co.tz</p></div></div>
                    <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-lg p-6 flex items-center space-x-4"><i class="fab fa-facebook text-2xl text-blue-600"></i><div><h3 class="font-bold">Mitandao</h3><div class="flex space-x-4 mt-2"><a href="https://www.facebook.com/share/1CJJE875gf/" target="_blank" class="text-blue-700"><i class="fab fa-facebook fa-2x"></i></a><a href="https://www.instagram.com/mr.haule1976" target="_blank" class="text-pink-600"><i class="fab fa-instagram fa-2x"></i></a></div></div></div>
                </div>
                <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-xl p-6">
                    <h2 class="text-2xl font-bold mb-6">Tutumie Ujumbe</h2>
                    <form id="contactForm">
                        <input type="text" id="contactName" placeholder="Jina Kamili *" class="w-full border rounded-lg p-2 mb-3 dark:bg-gray-800" required>
                        <input type="email" id="contactEmail" placeholder="Barua Pepe" class="w-full border rounded-lg p-2 mb-3 dark:bg-gray-800">
                        <input type="tel" id="contactPhone" placeholder="Namba ya Simu *" class="w-full border rounded-lg p-2 mb-3 dark:bg-gray-800" required>
                        <textarea id="contactMessage" rows="4" placeholder="Ujumbe *" class="w-full border rounded-lg p-2 mb-3 dark:bg-gray-800" required></textarea>
                        <button type="submit" class="bg-blue-600 text-white w-full py-2 rounded-full font-semibold">Tuma Ujumbe</button>
                    </form>
                </div>
            </div>
            <div class="mt-12 bg-white dark:bg-gray-900 rounded-2xl shadow-xl p-4">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3961.672736648393!2d39.26540861470372!3d-6.822310195044136!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x185c4c6f6b5c7b6f%3A0x7e9a8a6f0a0c0c0!2sDar%20es%20Salaam%2C%20Tanzania!5e0!3m2!1sen!2s!4v1650000000000!5m2!1sen!2s" width="100%" height="350" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </div>
    </section>

    <footer class="bg-blue-800 text-white py-8 text-center">&copy; 2025 MR. HAULE SERVICES 26/27</footer>

    <div id="modal" class="modal"><div class="modal-3d"><i class="fas fa-info-circle text-4xl mb-2"></i><h3 id="modalTitle"></h3><p id="modalMessage"></p><button id="modalClose" class="mt-4 bg-white text-blue-800 px-6 py-2 rounded-full">Sawa</button></div></div>

    <script>
        const BACKEND_URL = 'https://your-backend-url.onrender.com';
        const modal = document.getElementById('modal');
        function showModal(title, msg) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMessage').textContent = msg;
            modal.classList.add('active');
        }
        document.getElementById('modalClose').onclick = () => modal.classList.remove('active');
        document.getElementById('contactForm').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('contactName').value.trim();
            const email = document.getElementById('contactEmail').value.trim();
            const phone = document.getElementById('contactPhone').value.trim();
            const message = document.getElementById('contactMessage').value.trim();
            if (!name || !phone || !message) return showModal('Kosa', 'Jaza sehemu zote zenye nyota.');
            try {
                const res = await fetch(`${BACKEND_URL}/api/contact`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, phone, message })
                });
                const data = await res.json();
                if (data.success) {
                    showModal('Ujumbe Umetumwa', data.message);
                    document.getElementById('contactForm').reset();
                } else {
                    showModal('Hitilafu', data.message);
                }
            } catch (err) {
                showModal('Hitilafu', 'Server haijibu. Jaribu tena.');
            }
        };
    </script>
</body>
</html>
