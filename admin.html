<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | Mr Haule Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Times New Roman', Times, serif; background: #111; color: #fff; }
        .modal-3d { transform-style: preserve-3d; transition: transform 0.2s; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .modal-3d:hover { transform: rotateX(1deg) rotateY(1deg); }
        .glass-card { background: rgba(30,30,40,0.7); backdrop-filter: blur(8px); border: 1px solid rgba(59,130,246,0.3); }
        .btn-approve { background: #16a34a; transition: 0.2s; }
        .btn-approve:hover { background: #15803d; transform: scale(1.02); }
        .btn-reject { background: #dc2626; transition: 0.2s; }
        .btn-reject:hover { background: #b91c1c; transform: scale(1.02); }
    </style>
</head>
<body>

    <canvas id="bg-canvas" class="fixed top-0 left-0 w-full h-full -z-10"></canvas>

    <div class="relative z-10 p-6 max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-blue-400">Admin Panel</h1>
            <button onclick="logout()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg">Logout</button>
        </div>

        <div class="glass-card rounded-2xl p-6">
            <h2 class="text-xl font-semibold mb-4">Service Requests</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="border-b border-gray-600">
                        <tr><th>User Email</th><th>Service</th><th>Code</th><th>Status</th><th>Action</th></tr>
                    </thead>
                    <tbody id="requests-table"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js"
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, onAuthStateChanged, signOut } from "firebase/auth";
        import { getDatabase, ref, onValue, update, get } from "firebase/database";

        const firebaseConfig = {
            apiKey: "AIzaSyAOpjaV41QyCJGO_ptv_gmD_MYFWCcSA6k",
            authDomain: "haule-81f1d.firebaseapp.com",
            databaseURL: "https://haule-81f1d-default-rtdb.firebaseio.com"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        window.logout = () => signOut(auth).then(() => location.href = "index.html");

        async function loadRequests() {
            const requestsRef = ref(db, "requests");
            onValue(requestsRef, async (snap) => {
                const tbody = document.getElementById("requests-table");
                tbody.innerHTML = "";
                if (!snap.exists()) return tbody.innerHTML = "<tr><td colspan='5'>No requests</td></tr>";
                for (const [id, req] of Object.entries(snap.val())) {
                    // Fetch user email
                    let email = "unknown";
                    try {
                        const userSnap = await get(ref(db, `users/${req.userId}`));
                        email = userSnap.val()?.email || "unknown";
                    } catch(e) {}
                    const statusClass = req.status === "approved" ? "text-green-400" : req.status === "rejected" ? "text-red-400" : "text-yellow-400";
                    tbody.innerHTML += `
                        <tr class="border-b border-gray-700">
                            <td class="py-2">${email}</td>
                            <td>${req.service}</td>
                            <td>${req.code}</td>
                            <td class="${statusClass}">${req.status.toUpperCase()}</td>
                            <td>
                                ${req.status === "pending" ? `
                                    <button onclick="updateStatus('${id}','approved')" class="btn-approve text-white px-3 py-1 rounded-lg mr-2">Approve</button>
                                    <button onclick="updateStatus('${id}','rejected')" class="btn-reject text-white px-3 py-1 rounded-lg">Reject</button>
                                ` : "—"}
                            </td>
                        </tr>
                    `;
                }
            });
        }

        window.updateStatus = async (requestId, newStatus) => {
            await update(ref(db, `requests/${requestId}`), { status: newStatus });
            alert(`Request ${newStatus}`);
        };

        onAuthStateChanged(auth, async (user) => {
            if (!user) location.href = "index.html";
            else {
                const snap = await get(ref(db, `users/${user.uid}`));
                if (snap.val()?.role !== "admin") location.href = "dashboard.html";
                else loadRequests();
            }
        });
    </script>

    <!-- Three.js Background -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("bg-canvas"), alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.position.z = 30;

        const geometry = new THREE.BufferGeometry();
        const count = 1500;
        const positions = new Float32Array(count * 3);
        for (let i = 0; i < count; i++) {
            positions[i*3] = (Math.random() - 0.5) * 120;
            positions[i*3+1] = (Math.random() - 0.5) * 70;
            positions[i*3+2] = (Math.random() - 0.5) * 60;
        }
        geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
        const material = new THREE.PointsMaterial({ color: 0x2563eb, size: 0.2 });
        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        function animate() {
            requestAnimationFrame(animate);
            particles.rotation.y += 0.0005;
            particles.rotation.x += 0.0003;
            renderer.render(scene, camera);
        }
        animate();
        window.addEventListener("resize", () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
