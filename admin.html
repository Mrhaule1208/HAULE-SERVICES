<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Mr. Haule Services</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { font-family: 'Times New Roman', Times, serif; }
    body { background: #0f172a; }
    h1, h2, h3, .font-bold { font-family: 'Times New Roman', Times, serif; font-weight: 700; }
    .glass-panel { background: rgba(255,255,255,0.1); backdrop-filter: blur(12px); border-radius: 2rem; }
    .toast-3d { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #2563eb, #1e40af); color: white; padding: 12px 24px; border-radius: 40px; font-weight: 600; z-index: 2000; animation: fadeUp 0.3s; }
    @keyframes fadeUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    .site-header { text-align: center; padding: 1rem 0 0.5rem; background: #0f172a; border-bottom: 1px solid #334155; }
    .nav-bar { background: #0f172a; border-bottom: 1px solid #334155; padding: 0.75rem 1rem; margin-bottom: 1.5rem; }
    .table-container { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
    th { background: rgba(59,130,246,0.2); font-weight: 600; }
    tr:hover { background: rgba(255,255,255,0.05); }
    .status-select { background: #1e293b; border: 1px solid #3b82f6; border-radius: 20px; padding: 4px 12px; color: white; font-size: 0.85rem; }
    .search-box { background: #1e293b; border: 1px solid #3b82f6; border-radius: 40px; padding: 8px 16px; width: 100%; max-width: 300px; color: white; }
  </style>
</head>
<body>

<div class="site-header">
  <div class="flex justify-center items-center gap-3">
    <img src="logo.jpg" alt="Logo" class="w-12 h-12 rounded-full border-2 border-blue-500" onerror="this.onerror=null; this.src='https://placehold.co/50x50/1e3c2c/white?text=MH';">
    <span class="text-3xl md:text-4xl font-extrabold text-white">MR. HAULE SERVICES</span>
  </div>
</div>

<div class="nav-bar sticky top-0 z-40 shadow-sm">
  <div class="max-w-7xl mx-auto flex flex-wrap items-center justify-between gap-3">
    <div class="flex gap-4">
      <button onclick="window.location.href='dashboard.html'" class="text-blue-400 hover:text-blue-300"><i class="fas fa-tachometer-alt"></i> Dashboard</button>
      <button onclick="window.location.href='index.html'" class="text-blue-400 hover:text-blue-300"><i class="fas fa-home"></i> Home</button>
    </div>
    <button id="logout-admin" class="bg-red-500 px-5 py-2 rounded-full"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </div>
</div>

<div class="max-w-7xl mx-auto p-4">
  <h1 class="text-3xl font-bold text-white mb-6">Admin Dashboard</h1>
  <div class="flex flex-wrap justify-between items-center gap-4 mb-6">
    <input type="text" id="searchInput" placeholder="Search by name, phone or service..." class="search-box">
    <div><span class="text-white mr-2">Filter by status:</span><select id="statusFilter" class="status-select"><option value="all">All</option><option value="Pending">Pending</option><option value="Completed">Completed</option></select></div>
  </div>
  <div class="glass-panel p-6">
    <div class="table-container">
      <table id="requests-table">
        <thead><tr><th>Name</th><th>Phone</th><th>Service</th><th>Details</th><th>Date</th><th>Status</th><th>Action</th></tr></thead>
        <tbody id="table-body"><tr><td colspan="7" class="text-center text-gray-400">Loading requests...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
  import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAOpjaV41QyCJGO_ptv_gmD_MYFWCcSA6k",
    authDomain: "haule-81f1d.firebaseapp.com",
    databaseURL: "https://haule-81f1d-default-rtdb.firebaseio.com",
    projectId: "haule-81f1d",
    storageBucket: "haule-81f1d.firebasestorage.app",
    messagingSenderId: "612778536991",
    appId: "1:612778536991:web:d6c6fb2495984de7fd652a"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  let allRequests = [];

  function showToast(msg, isError = false) {
    const toast = document.createElement('div');
    toast.className = 'toast-3d';
    if (isError) toast.style.background = "linear-gradient(135deg, #ef4444, #b91c1c)";
    else toast.style.background = "linear-gradient(135deg, #2563eb, #1e40af)";
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  function renderTable(requests) {
    const tbody = document.getElementById('table-body');
    if (!requests.length) { tbody.innerHTML = '<tr><td colspan="7" class="text-center text-gray-400">No requests found</td></tr>'; return; }
    tbody.innerHTML = '';
    requests.forEach(req => {
      const row = tbody.insertRow();
      row.insertCell(0).innerText = req.userName || 'N/A';
      row.insertCell(1).innerText = req.phone || 'N/A';
      row.insertCell(2).innerText = req.service || 'N/A';
      row.insertCell(3).innerText = (req.details || '').substring(0, 50) + (req.details?.length > 50 ? '...' : '');
      row.insertCell(4).innerText = new Date(req.date).toLocaleString();
      const statusCell = row.insertCell(5);
      const select = document.createElement('select');
      select.className = 'status-select';
      select.innerHTML = `<option value="Pending" ${req.status === 'Pending' ? 'selected' : ''}>Pending</option><option value="Completed" ${req.status === 'Completed' ? 'selected' : ''}>Completed</option>`;
      select.addEventListener('change', async (e) => {
        const newStatus = e.target.value;
        await update(ref(db, `allRequests/${req.requestId}`), { status: newStatus });
        await update(ref(db, `requests/${req.userId}/${req.requestId}`), { status: newStatus });
        showToast(`Status changed to ${newStatus}`);
        loadAndFilter();
      });
      statusCell.appendChild(select);
      const actionCell = row.insertCell(6);
      const viewBtn = document.createElement('button');
      viewBtn.className = 'text-blue-400 text-sm';
      viewBtn.innerText = 'View';
      viewBtn.onclick = () => { alert(`Full Details:\n\nName: ${req.userName}\nPhone: ${req.phone}\nEmail: ${req.email}\nService: ${req.service}\nAmount: ${req.amount}\nDetails: ${req.details}\nDate: ${new Date(req.date).toLocaleString()}\nStatus: ${req.status}`); };
      actionCell.appendChild(viewBtn);
    });
  }

  async function loadAndFilter() {
    const snapshot = await get(ref(db, 'allRequests'));
    if (!snapshot.exists()) { allRequests = []; renderTable([]); return; }
    const data = snapshot.val();
    allRequests = Object.entries(data).map(([id, req]) => ({ ...req, requestId: id }));
    applyFilters();
  }

  function applyFilters() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    const statusFilter = document.getElementById('statusFilter').value;
    let filtered = allRequests;
    if (searchTerm) filtered = filtered.filter(req => (req.userName?.toLowerCase().includes(searchTerm)) || (req.phone?.includes(searchTerm)) || (req.service?.toLowerCase().includes(searchTerm)));
    if (statusFilter !== 'all') filtered = filtered.filter(req => req.status === statusFilter);
    renderTable(filtered);
  }

  document.getElementById('searchInput').addEventListener('input', applyFilters);
  document.getElementById('statusFilter').addEventListener('change', applyFilters);

  onAuthStateChanged(auth, async (user) => {
    if (!user || user.email !== 'hamanierasmuce@gmail.com') { window.location.href = 'index.html'; return; }
    loadAndFilter();
  });

  document.getElementById('logout-admin').onclick = () => { signOut(auth); window.location.href = 'index.html'; };
</script>
</body>
</html>
