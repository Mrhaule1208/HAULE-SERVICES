<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Mr. Haule Services</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body { font-family: 'Inter', sans-serif; background: #1e293b; }
    .glass-panel { background: rgba(255,255,255,0.1); backdrop-filter: blur(12px); border-radius: 2rem; }
  </style>
</head>
<body class="p-6 text-white">
  <div class="max-w-7xl mx-auto">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-bold">Admin Dashboard</h1>
      <button id="logout-admin" class="bg-red-500 px-5 py-2 rounded-full"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>

    <!-- Sales Report -->
    <div class="glass-panel p-6 mb-8">
      <h2 class="text-2xl font-bold mb-4">Monthly Sales Report</h2>
      <div id="sales-report" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
    </div>

    <!-- All Requests -->
    <div class="glass-panel p-6">
      <h2 class="text-2xl font-bold mb-4">All User Requests</h2>
      <div id="requests-list" class="space-y-4"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
    import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

    // ========== REPLACE WITH YOUR FIREBASE CONFIG ==========
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      databaseURL: "YOUR_DATABASE_URL",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };
    // ======================================================

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    onAuthStateChanged(auth, async (user) => {
      if (!user || user.email !== 'hamanierasmuce@gmail.com') {
        window.location.href = 'index.html';
        return;
      }
      loadAllRequests();
      generateSalesReport();
    });

    async function loadAllRequests() {
      const snapshot = await get(ref(db, 'allRequests'));
      const container = document.getElementById('requests-list');
      container.innerHTML = '';
      if (!snapshot.exists()) { container.innerHTML = '<p>No requests yet.</p>'; return; }
      const requests = snapshot.val();
      Object.entries(requests).forEach(([id, req]) => {
        const div = document.createElement('div');
        div.className = 'bg-white/20 p-4 rounded-xl backdrop-blur';
        div.innerHTML = `
          <div class="flex flex-wrap justify-between items-start gap-2">
            <div><strong>${req.userName}</strong> (${req.email})<br>Service: ${req.service} | Amount: ${req.amount}<br>Details: ${req.details}<br>File: ${req.fileUrl ? `<a href="${req.fileUrl}" target="_blank" class="text-yellow-300">View</a>` : 'None'}</div>
            <div>
              <select data-id="${id}" class="status-select bg-gray-800 p-2 rounded-lg text-white">
                <option value="Pending" ${req.status === 'Pending' ? 'selected' : ''}>Pending</option>
                <option value="Processing" ${req.status === 'Processing' ? 'selected' : ''}>Processing</option>
                <option value="Completed" ${req.status === 'Completed' ? 'selected' : ''}>Completed</option>
              </select>
            </div>
          </div>
        `;
        container.appendChild(div);
      });
      document.querySelectorAll('.status-select').forEach(select => {
        select.addEventListener('change', async (e) => {
          const reqId = select.dataset.id;
          const newStatus = select.value;
          await update(ref(db, `allRequests/${reqId}`), { status: newStatus });
          const reqData = (await get(ref(db, `allRequests/${reqId}`))).val();
          if (reqData.userId) {
            await update(ref(db, `requests/${reqData.userId}/${reqId}`), { status: newStatus });
          }
          alert('Status updated');
        });
      });
    }

    async function generateSalesReport() {
      const snapshot = await get(ref(db, 'allRequests'));
      if (!snapshot.exists()) return;
      const requests = Object.values(snapshot.val());
      const monthly = {};
      requests.forEach(req => {
        const date = new Date(req.date);
        const monthYear = `${date.getMonth()+1}/${date.getFullYear()}`;
        let amountNum = 0;
        if (req.amount.includes(',')) amountNum = parseInt(req.amount.replace(',',''));
        else if (req.amount.includes('page')) amountNum = 500; // approximate per page
        else amountNum = parseInt(req.amount) || 0;
        monthly[monthYear] = (monthly[monthYear] || 0) + amountNum;
      });
      const reportDiv = document.getElementById('sales-report');
      reportDiv.innerHTML = '';
      for (const [month, total] of Object.entries(monthly)) {
        reportDiv.innerHTML += `<div class="bg-white/20 p-4 rounded-lg text-center"><h3 class="font-bold">${month}</h3><p class="text-2xl">TZS ${total.toLocaleString()}</p></div>`;
      }
    }

    document.getElementById('logout-admin').onclick = () => { signOut(auth); window.location.href = 'index.html'; };
  </script>
</body>
</html>
