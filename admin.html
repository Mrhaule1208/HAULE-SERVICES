<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Mr. Haule Services</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      font-family: 'Times New Roman', Times, serif;
    }
    body {
      background: #0f172a;
    }
    h1, h2, h3, .font-bold {
      font-family: 'Times New Roman', Times, serif;
      font-weight: 700;
    }
    .glass-panel {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
    }
    .tab-active {
      border-bottom: 3px solid #3b82f6;
      color: #3b82f6;
    }
    .toast-3d {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #2563eb, #1e40af);
      color: white;
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: 600;
      z-index: 2000;
      animation: fadeUp 0.3s;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    .site-header {
      text-align: center;
      padding: 1rem 0 0.5rem;
      background: #0f172a;
      border-bottom: 1px solid #334155;
    }
    .nav-bar {
      background: #0f172a;
      border-bottom: 1px solid #334155;
      padding: 0.75rem 1rem;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>

<div class="site-header">
  <div class="flex justify-center items-center gap-3">
    <img src="logo.jpg" alt="Logo" class="w-12 h-12 rounded-full border-2 border-blue-500" onerror="this.onerror=null; this.src='https://placehold.co/50x50/1e3c2c/white?text=MH';">
    <span class="text-3xl md:text-4xl font-extrabold text-white">MR. HAULE SERVICES</span>
  </div>
</div>

<div class="nav-bar sticky top-0 z-40 shadow-sm">
  <div class="max-w-7xl mx-auto flex flex-wrap items-center justify-between gap-3">
    <div class="flex gap-4">
      <button onclick="window.location.href='dashboard.html'" class="text-blue-400 hover:text-blue-300"><i class="fas fa-tachometer-alt"></i> Dashboard</button>
      <button onclick="window.location.href='index.html'" class="text-blue-400 hover:text-blue-300"><i class="fas fa-home"></i> Home</button>
    </div>
    <button id="logout-admin" class="bg-red-500 px-5 py-2 rounded-full"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </div>
</div>

<div class="max-w-7xl mx-auto p-4">
  <div class="flex justify-between items-center mb-8">
    <h1 class="text-3xl font-bold text-white">Admin Dashboard</h1>
  </div>

  <div class="flex gap-6 mb-8 border-b border-gray-600">
    <button id="tab-welcome-btn" class="py-2 px-4 text-lg font-semibold tab-active transition">Welcome</button>
    <button id="tab-admin-btn" class="py-2 px-4 text-lg font-semibold text-gray-300 transition">Admin</button>
  </div>

  <div id="welcome-tab" class="glass-panel p-8">
    <h2 class="text-2xl font-bold mb-4 text-white">Karibu Msimamizi</h2>
    <p class="text-gray-200 mb-4">Unaweza kusimamia maombi yote ya watumiaji, kubadilisha hali za maombi, na kuona ripoti za mauzo kwenye tab ya "Admin".</p>
    <div class="grid md:grid-cols-2 gap-6 mt-6">
      <div class="bg-white/10 p-4 rounded-xl">
        <i class="fas fa-users text-3xl text-blue-400 mb-2"></i>
        <h3 class="text-xl font-semibold text-white">Watumiaji Waliojiunga</h3>
        <p id="user-count" class="text-3xl font-bold text-white">-</p>
      </div>
      <div class="bg-white/10 p-4 rounded-xl">
        <i class="fas fa-file-alt text-3xl text-blue-400 mb-2"></i>
        <h3 class="text-xl font-semibold text-white">Jumla ya Maombi</h3>
        <p id="request-count" class="text-3xl font-bold text-white">-</p>
      </div>
    </div>
  </div>

  <div id="admin-tab" class="glass-panel p-6 hidden">
    <h2 class="text-2xl font-bold mb-4 text-white">Ripoti ya Mauzo Kwa Mwezi</h2>
    <div id="sales-report" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8"></div>
    <h2 class="text-2xl font-bold mb-4 text-white">Maombi Yote ya Watumiaji</h2>
    <div id="requests-list" class="space-y-4"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
  import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAOpjaV41QyCJGO_ptv_gmD_MYFWCcSA6k",
    authDomain: "haule-81f1d.firebaseapp.com",
    databaseURL: "https://haule-81f1d-default-rtdb.firebaseio.com",
    projectId: "haule-81f1d",
    storageBucket: "haule-81f1d.firebasestorage.app",
    messagingSenderId: "612778536991",
    appId: "1:612778536991:web:d6c6fb2495984de7fd652a"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  function showToast(msg, isError = false) {
    const toast = document.createElement('div');
    toast.className = 'toast-3d';
    if (isError) toast.style.background = "linear-gradient(135deg, #ef4444, #b91c1c)";
    else toast.style.background = "linear-gradient(135deg, #2563eb, #1e40af)";
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  onAuthStateChanged(auth, async (user) => {
    if (!user || user.email !== 'hamanierasmuce@gmail.com') {
      window.location.href = 'index.html';
      return;
    }
    loadWelcomeStats();
    loadAllRequests();
    generateSalesReport();
  });

  async function loadWelcomeStats() {
    const usersSnap = await get(ref(db, 'users'));
    const userCount = usersSnap.exists() ? Object.keys(usersSnap.val()).length : 0;
    document.getElementById('user-count').innerText = userCount;
    const requestsSnap = await get(ref(db, 'allRequests'));
    const requestCount = requestsSnap.exists() ? Object.keys(requestsSnap.val()).length : 0;
    document.getElementById('request-count').innerText = requestCount;
  }

  async function loadAllRequests() {
    const snapshot = await get(ref(db, 'allRequests'));
    const container = document.getElementById('requests-list');
    container.innerHTML = '';
    if (!snapshot.exists()) { container.innerHTML = '<p>Hakuna maombi bado.</p>'; return; }
    const requests = snapshot.val();
    Object.entries(requests).forEach(([id, req]) => {
      const div = document.createElement('div');
      div.className = 'bg-white/20 p-4 rounded-xl backdrop-blur';
      div.innerHTML = `
        <div class="flex flex-wrap justify-between items-start gap-2">
          <div><strong>${req.userName}</strong> (${req.email})<br>Huduma: ${req.service} | Kiasi: ${req.amount}<br>Maelezo: ${req.details}<br>Faili: ${req.fileUrl ? `<a href="${req.fileUrl}" target="_blank" class="text-yellow-300">Tazama</a>` : 'Hakuna'}</div>
          <div>
            <select data-id="${id}" class="status-select bg-gray-800 p-2 rounded-lg text-white">
              <option value="Pending" ${req.status === 'Pending' ? 'selected' : ''}>Inasubiri</option>
              <option value="Processing" ${req.status === 'Processing' ? 'selected' : ''}>Inachakatwa</option>
              <option value="Completed" ${req.status === 'Completed' ? 'selected' : ''}>Imekamilika</option>
            </select>
          </div>
        </div>
      `;
      container.appendChild(div);
    });
    document.querySelectorAll('.status-select').forEach(select => {
      select.addEventListener('change', async (e) => {
        const reqId = select.dataset.id;
        const newStatus = select.value;
        await update(ref(db, `allRequests/${reqId}`), { status: newStatus });
        const reqData = (await get(ref(db, `allRequests/${reqId}`))).val();
        if (reqData.userId) {
          await update(ref(db, `requests/${reqData.userId}/${reqId}`), { status: newStatus });
        }
        showToast(`✅ Hali imebadilishwa kuwa ${newStatus}`);
      });
    });
  }

  async function generateSalesReport() {
    const snapshot = await get(ref(db, 'allRequests'));
    if (!snapshot.exists()) return;
    const requests = Object.values(snapshot.val());
    const monthly = {};
    requests.forEach(req => {
      const date = new Date(req.date);
      const monthYear = `${date.getMonth()+1}/${date.getFullYear()}`;
      let amountNum = 0;
      if (req.amount.includes(',')) amountNum = parseInt(req.amount.replace(',',''));
      else if (req.amount.includes('page')) amountNum = 500;
      else amountNum = parseInt(req.amount) || 0;
      monthly[monthYear] = (monthly[monthYear] || 0) + amountNum;
    });
    const reportDiv = document.getElementById('sales-report');
    reportDiv.innerHTML = '';
    for (const [month, total] of Object.entries(monthly)) {
      reportDiv.innerHTML += `<div class="bg-white/20 p-4 rounded-lg text-center"><h3 class="font-bold text-white">${month}</h3><p class="text-2xl text-white">TZS ${total.toLocaleString()}</p></div>`;
    }
  }

  const welcomeTab = document.getElementById('welcome-tab');
  const adminTab = document.getElementById('admin-tab');
  const welcomeBtn = document.getElementById('tab-welcome-btn');
  const adminBtn = document.getElementById('tab-admin-btn');

  welcomeBtn.addEventListener('click', () => {
    welcomeTab.classList.remove('hidden');
    adminTab.classList.add('hidden');
    welcomeBtn.classList.add('tab-active');
    adminBtn.classList.remove('tab-active');
    adminBtn.classList.add('text-gray-300');
  });
  adminBtn.addEventListener('click', () => {
    adminTab.classList.remove('hidden');
    welcomeTab.classList.add('hidden');
    adminBtn.classList.add('tab-active');
    welcomeBtn.classList.remove('tab-active');
    welcomeBtn.classList.add('text-gray-300');
  });

  document.getElementById('logout-admin').onclick = () => { signOut(auth); window.location.href = 'index.html'; };
</script>
</body>
</html>
