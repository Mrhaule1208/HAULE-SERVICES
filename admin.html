<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | MR. HAULE SERVICES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f0f9ff; }
        .dark body { background: #0f172a; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index:1000; }
        .modal.active { display: flex; }
        .modal-3d { background:#1E3A8A; color:white; border-radius:24px; padding:24px; max-width:400px; text-align:center; box-shadow:0 25px 40px rgba(0,0,0,0.4); }
        .status-select { background:transparent; border:1px solid #ccc; border-radius:20px; padding:4px 8px; font-size:0.75rem; }
        .dark .status-select { background:#374151; border-color:#4b5563; color:white; }
    </style>
</head>
<body>
    <div class="text-center pt-8 pb-2"><div class="flex justify-center items-center space-x-3"><img src="images/1000096560.jpg" class="h-16 w-auto rounded-xl shadow-lg"><span class="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-800 to-blue-400">MR. HAULE SERVICES 26/27</span></div></div>

    <section id="adminContent" class="py-16 bg-gray-50 dark:bg-gray-800" style="display:none;">
        <div class="container mx-auto px-4">
            <div class="flex justify-between items-center mb-8"><h1 class="text-3xl font-bold text-blue-800">Admin Dashboard</h1><button id="logoutBtn" class="bg-red-600 text-white px-4 py-2 rounded-full">Logout</button></div>
            <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-xl p-6 overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200"><thead><tr><th class="px-4 py-3 text-left">Jina</th><th class="px-4 py-3 text-left">Simu</th><th class="px-4 py-3 text-left">Huduma</th><th class="px-4 py-3 text-left">Sub-service</th><th class="px-4 py-3 text-left">Tarehe</th><th class="px-4 py-3 text-left">Hadhi</th><th class="px-4 py-3 text-left">Vitendo</th></tr></thead><tbody id="requestsTableBody"></tbody></table>
                <div id="noDataMsg" class="text-center py-8 text-gray-500 hidden">Hakuna maombi.</div>
            </div>
        </div>
    </section>

    <section id="loginSection" class="py-16 bg-gray-50 dark:bg-gray-800 min-h-screen flex items-center justify-center"><div class="bg-white dark:bg-gray-900 rounded-2xl shadow-xl p-8 max-w-md w-full"><h2 class="text-2xl font-bold text-center text-blue-800 mb-6">Admin Login</h2><input type="password" id="adminPassword" class="w-full border rounded-lg p-2 mb-4" placeholder="Nywila"><button id="loginBtn" class="bg-blue-600 text-white w-full py-2 rounded-full">Ingia</button></div></section>

    <footer class="bg-blue-800 text-white py-8 text-center">&copy; 2025 MR. HAULE SERVICES 26/27</footer>

    <div id="modal" class="modal"><div class="modal-3d"><i class="fas fa-info-circle text-4xl mb-2"></i><h3 id="modalTitle"></h3><p id="modalMessage"></p><button id="modalClose" class="mt-4 bg-white text-blue-800 px-6 py-2 rounded-full">Sawa</button></div></div>

    <script>
        const BACKEND_URL = 'https://your-backend-url.onrender.com';
        const loginSection = document.getElementById('loginSection');
        const adminContent = document.getElementById('adminContent');
        const tbody = document.getElementById('requestsTableBody');
        const noDataMsg = document.getElementById('noDataMsg');
        const modal = document.getElementById('modal');
        function showModal(title, msg) { document.getElementById('modalTitle').textContent=title; document.getElementById('modalMessage').textContent=msg; modal.classList.add('active'); }
        document.getElementById('modalClose').onclick = () => modal.classList.remove('active');

        function checkLogin() { if(localStorage.getItem('adminLoggedIn')==='true') { loginSection.style.display='none'; adminContent.style.display='block'; loadRequests(); } else { loginSection.style.display='flex'; adminContent.style.display='none'; } }
        document.getElementById('loginBtn').onclick = () => { const pass = document.getElementById('adminPassword').value; if(pass==='admin123') { localStorage.setItem('adminLoggedIn','true'); checkLogin(); showModal('Karibu','Umefanikiwa kuingia.'); } else showModal('Kosa','Nywila si sahihi.',true); };
        document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('adminLoggedIn'); checkLogin(); showModal('Logout','Umefanikiwa kutoka.'); };

        async function loadRequests() {
            try {
                const res = await fetch(`${BACKEND_URL}/api/requests`);
                const requests = await res.json();
                if(requests.length===0) { noDataMsg.classList.remove('hidden'); tbody.innerHTML=''; return; }
                noDataMsg.classList.add('hidden'); tbody.innerHTML='';
                requests.forEach(req => {
                    const row = tbody.insertRow();
                    row.insertCell(0).innerHTML = `<div class="px-4 py-2">${escapeHtml(req.fullname)}</div>`;
                    row.insertCell(1).innerHTML = `<div class="px-4 py-2">${escapeHtml(req.phone)}</div>`;
                    row.insertCell(2).innerHTML = `<div class="px-4 py-2">${escapeHtml(req.mainService)}</div>`;
                    row.insertCell(3).innerHTML = `<div class="px-4 py-2">${escapeHtml(req.subService)}</div>`;
                    row.insertCell(4).innerHTML = `<div class="px-4 py-2">${new Date(req.timestamp).toLocaleString()}</div>`;
                    const statusCell = row.insertCell(5);
                    const select = document.createElement('select'); select.className='status-select';
                    ['Imepokelewa','Inafanyiwa kazi','Imekamilika'].forEach(s => { const opt=document.createElement('option'); opt.value=s; opt.textContent=s; if(s===req.status) opt.selected=true; select.appendChild(opt); });
                    select.onchange = async (e) => { await fetch(`${BACKEND_URL}/api/requests/${req._id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status:e.target.value}) }); loadRequests(); };
                    statusCell.appendChild(select);
                    const actionsCell = row.insertCell(6);
                    const delBtn = document.createElement('button'); delBtn.innerHTML='<i class="fas fa-trash-alt"></i>'; delBtn.className='text-red-600 hover:text-red-800'; delBtn.onclick = async () => { if(confirm('Futa ombi hili?')) { await fetch(`${BACKEND_URL}/api/requests/${req._id}`, { method:'DELETE' }); loadRequests(); } };
                    actionsCell.appendChild(delBtn);
                });
            } catch(e) { console.error(e); showModal('Hitilafu','Haiwezi kupakia maombi.'); }
        }
        function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; }); }
        checkLogin();
    </script>
</body>
</html>
