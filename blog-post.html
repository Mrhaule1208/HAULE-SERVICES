<!DOCTYPE html>

<body>
    <!-- Header same as index -->
    <div class="text-center pt-8 pb-2"><div class="flex justify-center items-center space-x-3"><img src="images/1000096560.jpg" class="h-16 w-auto rounded-xl shadow-lg"><span class="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-800 to-blue-400">MR. HAULE SERVICES 26/27</span></div></div>
    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-blue-200 shadow-sm"><div class="container mx-auto px-4 py-3 flex justify-center space-x-6 md:space-x-10"><a href="index.html" class="font-semibold text-blue-700">Nyumbani</a><a href="index.html#services" class="font-semibold text-blue-700">Huduma Zetu</a><a href="blog.html" class="font-semibold text-blue-600">Blog</a><a href="apply.html" class="font-semibold text-blue-700">Omba Huduma</a><a href="contact.html" class="font-semibold text-blue-700">Mawasiliano</a><a href="about.html" class="font-semibold text-blue-700">Kuhusu Sisi</a></div></nav>

    <section class="py-16 bg-gray-50 dark:bg-gray-800"><div class="container mx-auto px-4 max-w-4xl"><div id="articleContent" class="bg-white dark:bg-gray-900 rounded-2xl shadow-xl p-6 md:p-10 text-center py-12"><i class="fas fa-spinner fa-pulse text-3xl"></i><p>Inapakia...</p></div></div></section>

    <footer class="bg-blue-800 text-white py-8 text-center">&copy; 2025 MR. HAULE SERVICES 26/27</footer>

    <script>
        const posts = {
            'heslb-guide': { title: 'Mwongozo wa Maombi ya Mkopo HESLB', date: 'Jan 15, 2025', category: 'HESLB', image: 'https://images.pexels.com/photos/159823/pexels-photo-159823.jpeg', content: '<p>Kila mwaka, wanafunzi wengi hukabiliana na changamoto ya kupata mkopo. Makala hii itakuelekeza hatua kwa hatua.</p><h2>1. Jitayarishe Mapema</h2><p>Hakikisha una nyaraka zote: cheti cha kuzaliwa, vyeti vya kidato, barua ya kujiunga chuo, namba ya NIDA.</p><h2>2. Jaza Fomu Kwa Makini</h2><p>Ingia kwenye tovuti ya HESLB (olas.heslb.go.tz) na ujaze taarifa kwa usahihi.</p><h2>3. Hakiki na Wasilisha</h2><p>Kabla ya kubofya Submit, hakiki taarifa zote. Baada ya kuwasilisha, utapokea namba ya maombi.</p><h2>4. Fuatilia Ombi Lako</h2><p>Angalia mfumo mara kwa mara. Kama unakabiliwa na tatizo, wasiliana nasi.</p>' },
            'rita-birth-cert': { title: 'Hatua za Kupata Cheti cha Kuzaliwa (RITA)', date: 'Jan 10, 2025', category: 'RITA', image: 'https://images.pexels.com/photos/3777622/pexels-photo-3777622.jpeg', content: '<p>Cheti cha kuzaliwa ni hati muhimu. Makala hii inaelezea jinsi ya kukipata kwa urahisi.</p><h2>1. Nenda kwenye Tovuti au Ofisi ya RITA</h2><p>Unaweza kufanya maombi mtandaoni kupitia e-services.rita.go.tz.</p><h2>2. Andaa Nyaraka</h2><p>Kitambulisho cha mzazi, fomu ya kuzaliwa kutoka hospitali, namba ya simu.</p><h2>3. Jaza Fomu na Lipa Ada</h2><p>Ada ni TZS 2,000. Baada ya malipo, chapisha fomu.</p><h2>4. Pokea Cheti</h2><p>Baada ya siku 3-5, cheti kitakuwa tayari.</p>' },
            'nida-registration': { title: 'Jinsi ya Kufanya Usajili wa NIDA', date: 'Jan 5, 2025', category: 'NIDA', image: 'https://images.pexels.com/photos/3970330/pexels-photo-3970330.jpeg', content: '<p>Kitambulisho cha NIDA kinahitajika kwa shughuli nyingi. Hapa utajua hatua za kusajili.</p><h2>Usajili wa Kwanza</h2><p>Nenda kwenye kituo cha usajili (Ward Executive Office) na uwasilishe cheti cha kuzaliwa na picha.</p><h2>Marekebisho ya Taarifa</h2><p>Kama kuna makosa, wasiliana na ofisi ya NIDA au tumia mfumo wa e-services.</p>' },
            'pc-speed': { title: 'Vidokezo 5 vya Kuongeza Speed ya Laptop', date: 'Dec 28, 2024', category: 'Computer Maintenance', image: 'https://images.pexels.com/photos/207691/pexels-photo-207691.jpeg', content: '<p>Fuata vidokezo hivi kuirejesha kasi.</p><h2>1. Safisha Diski na Programu Zisizohitajika</h2><p>Ondoa programu ambazo hutumii.</p><h2>2. Ongeza RAM au Badilisha HDD kuwa SSD</h2><p>SSD inaongeza kasi mara 5-10.</p><h2>3. Punguza Programu Zinazoanza Wakati wa Kuwasha</h2><p>Fungua Task Manager na uondoe programu zisizo za lazima.</p><h2>4. Sasisha Madereva na Mfumo</h2><p>Hakikisha Windows au macOS imesasishwa.</p><h2>5. Tumia Antivirus Nyepesi</h2><p>Virusi hupunguza kasi. Tunasaidia kuweka antivirus bora.</p>' }
        };
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('post');
        const container = document.getElementById('articleContent');
        const post = posts[postId];
        if (!post) container.innerHTML = '<div class="text-center py-12"><i class="fas fa-exclamation-triangle text-4xl text-orange-500"></i><h2 class="text-2xl font-bold mt-4">Makala Haipatikani</h2><a href="blog.html" class="text-blue-600">Rudi kwenye Blog</a></div>';
        else container.innerHTML = `<div><img src="${post.image}" class="w-full h-64 object-cover rounded-xl mb-6"><div class="flex text-sm text-gray-500 mb-4"><span><i class="far fa-calendar-alt"></i> ${post.date}</span><span class="mx-2">•</span><span>${post.category}</span></div><h1 class="text-3xl font-bold mb-6">${post.title}</h1><div class="article-content">${post.content}</div><div class="mt-8 pt-6 border-t"><p>Je, unahitaji msaada? <a href="apply.html" class="text-blue-600">Omba huduma</a> au <a href="contact.html" class="text-blue-600">wasiliana nasi</a>.</p></div></div>`;
    </script>
</body>
</html>
