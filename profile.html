<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile | Mr Haule Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Times New Roman', Times, serif; background: #111; color: #eee; }
        .modal-3d { transform-style: preserve-3d; transition: transform 0.2s; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .modal-3d:hover { transform: rotateX(1deg) rotateY(1deg); }
        .glass-card { background: rgba(30,30,40,0.7); backdrop-filter: blur(8px); border: 1px solid rgba(59,130,246,0.3); }
        .btn-save { background: #2563eb; transition: 0.2s; }
        .btn-save:hover { background: #1d4ed8; transform: scale(1.02); }
    </style>
</head>
<body>

    <canvas id="bg-canvas" class="fixed top-0 left-0 w-full h-full -z-10"></canvas>

    <div class="relative z-10 p-6 max-w-2xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-blue-400">Profile</h1>
            <div>
                <a href="dashboard.html" class="text-gray-300 hover:text-white mr-4">Dashboard</a>
                <button onclick="logout()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg">Logout</button>
            </div>
        </div>

        <div class="glass-card rounded-2xl p-8">
            <div class="mb-4">
                <label class="block text-gray-300 mb-1">Full Name</label>
                <input id="name" class="w-full bg-gray-800 border border-gray-600 p-3 rounded-lg">
            </div>
            <div class="mb-6">
                <label class="block text-gray-300 mb-1">Phone Number</label>
                <input id="phone" class="w-full bg-gray-800 border border-gray-600 p-3 rounded-lg">
            </div>
            <button onclick="saveProfile()" class="btn-save w-full text-white py-3 rounded-lg font-semibold">Save Changes</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js"
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, onAuthStateChanged, signOut } from "firebase/auth";
        import { getDatabase, ref, get, set } from "firebase/database";

        const firebaseConfig = {
            apiKey: "AIzaSyAOpjaV41QyCJGO_ptv_gmD_MYFWCcSA6k",
            authDomain: "haule-81f1d.firebaseapp.com",
            databaseURL: "https://haule-81f1d-default-rtdb.firebaseio.com"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let currentUserId = null;

        window.logout = () => signOut(auth).then(() => location.href = "index.html");

        window.saveProfile = async () => {
            if (!currentUserId) return;
            const name = document.getElementById("name").value;
            const phone = document.getElementById("phone").value;
            await set(ref(db, `users/${currentUserId}/profile`), { name, phone });
            alert("Profile saved!");
        };

        onAuthStateChanged(auth, async (user) => {
            if (!user) location.href = "index.html";
            else {
                currentUserId = user.uid;
                const snap = await get(ref(db, `users/${user.uid}/profile`));
                const data = snap.val() || {};
                document.getElementById("name").value = data.name || "";
                document.getElementById("phone").value = data.phone || "";
            }
        });
    </script>

    <!-- Three.js Background -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("bg-canvas"), alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.position.z = 30;

        const geometry = new THREE.BufferGeometry();
        const count = 1200;
        const positions = new Float32Array(count * 3);
        for (let i = 0; i < count; i++) {
            positions[i*3] = (Math.random() - 0.5) * 100;
            positions[i*3+1] = (Math.random() - 0.5) * 60;
            positions[i*3+2] = (Math.random() - 0.5) * 50;
        }
        geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
        const material = new THREE.PointsMaterial({ color: 0x3b82f6, size: 0.2 });
        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        function animate() {
            requestAnimationFrame(animate);
            particles.rotation.y += 0.0004;
            particles.rotation.x += 0.0002;
            renderer.render(scene, camera);
        }
        animate();
        window.addEventListener("resize", () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
