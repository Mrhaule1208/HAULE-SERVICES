<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Mr Haule Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Times New Roman', Times, serif; margin: 0; background: #111; color: #eee; }
        .modal-3d { transform-style: preserve-3d; transition: transform 0.3s, box-shadow 0.3s; box-shadow: 0 15px 25px -10px rgba(0,0,0,0.5); }
        .modal-3d:hover { transform: rotateX(2deg) rotateY(1deg); box-shadow: 0 25px 30px -12px black; }
        .glass-card { background: rgba(30,30,40,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(59,130,246,0.3); }
        .btn-primary { background: #2563eb; transition: all 0.2s; }
        .btn-primary:hover { background: #1d4ed8; transform: scale(1.02); }
    </style>
</head>
<body class="min-h-screen">

    <canvas id="bg-canvas" class="fixed top-0 left-0 w-full h-full -z-10"></canvas>

    <div class="relative z-10 p-6 max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-blue-400">Dashboard</h1>
            <div>
                <a href="profile.html" class="text-gray-300 hover:text-white mr-4">Profile</a>
                <button onclick="logout()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg">Logout</button>
            </div>
        </div>

        <!-- Submit Request -->
        <div class="glass-card rounded-2xl p-6 mb-8">
            <h2 class="text-xl font-semibold mb-4">Submit Service Request</h2>
            <div class="grid md:grid-cols-3 gap-4">
                <select id="service" class="bg-gray-800 border border-gray-600 p-2 rounded-lg">
                    <option>HESLB</option>
                    <option>NIDA</option>
                    <option>RITA</option>
                    <option>IT Support</option>
                </select>
                <input id="code" placeholder="Payment Code / Reference" class="bg-gray-800 border border-gray-600 p-2 rounded-lg">
                <button onclick="sendRequest()" class="btn-primary text-white px-6 py-2 rounded-lg">Submit</button>
            </div>
        </div>

        <!-- My Requests -->
        <div class="glass-card rounded-2xl p-6 mb-8">
            <h2 class="text-xl font-semibold mb-4">My Requests</h2>
            <div id="requests-list" class="space-y-3"></div>
        </div>

        <!-- AI Chat -->
        <div class="glass-card rounded-2xl p-6">
            <h2 class="text-xl font-semibold mb-4">AI Assistant</h2>
            <div id="chat-log" class="h-64 overflow-y-auto bg-gray-900/50 rounded-lg p-3 mb-3 text-sm"></div>
            <div class="flex gap-2">
                <input id="msg" placeholder="Ask anything..." class="flex-1 bg-gray-800 border border-gray-600 p-2 rounded-lg">
                <button onclick="sendChat()" class="bg-green-600 hover:bg-green-700 px-4 py-2 rounded-lg">Send</button>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js"
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, onAuthStateChanged, signOut } from "firebase/auth";
        import { getDatabase, ref, push, set, onValue, query, orderByChild, equalTo, get } from "firebase/database";

        const firebaseConfig = {
            apiKey: "AIzaSyAOpjaV41QyCJGO_ptv_gmD_MYFWCcSA6k",
            authDomain: "haule-81f1d.firebaseapp.com",
            databaseURL: "https://haule-81f1d-default-rtdb.firebaseio.com"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let currentUserId = null;

        window.logout = () => signOut(auth).then(() => location.href = "index.html");

        window.sendRequest = async () => {
            if (!currentUserId) return;
            const service = document.getElementById("service").value;
            const code = document.getElementById("code").value;
            if (!code) return alert("Please enter a payment code");
            const newRef = push(ref(db, "requests"));
            await set(newRef, {
                userId: currentUserId,
                service,
                code,
                status: "pending",
                timestamp: Date.now()
            });
            document.getElementById("code").value = "";
            alert("Request submitted");
            loadRequests();
        };

        function loadRequests() {
            if (!currentUserId) return;
            const userRequestsRef = query(ref(db, "requests"), orderByChild("userId"), equalTo(currentUserId));
            onValue(userRequestsRef, (snap) => {
                const list = document.getElementById("requests-list");
                list.innerHTML = "";
                if (!snap.exists()) return list.innerHTML = "<p class='text-gray-400'>No requests yet.</p>";
                snap.forEach(child => {
                    const req = child.val();
                    const statusColor = req.status === "approved" ? "text-green-400" : req.status === "rejected" ? "text-red-400" : "text-yellow-400";
                    list.innerHTML += `
                        <div class="bg-gray-800 p-3 rounded-lg flex justify-between">
                            <div><strong>${req.service}</strong><br><span class="text-sm">${req.code}</span></div>
                            <div class="${statusColor} font-semibold">${req.status.toUpperCase()}</div>
                        </div>
                    `;
                });
            });
        }

        onAuthStateChanged(auth, (user) => {
            if (!user) location.href = "index.html";
            else {
                currentUserId = user.uid;
                loadRequests();
            }
        });
    </script>

    <script>
        // Chat with local server
        window.sendChat = async () => {
            const msgInput = document.getElementById("msg");
            const msg = msgInput.value.trim();
            if (!msg) return;
            const chatLog = document.getElementById("chat-log");
            chatLog.innerHTML += `<div class="text-right text-blue-300 my-1">You: ${msg}</div>`;
            msgInput.value = "";
            try {
                const res = await fetch("http://localhost:3000/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();
                chatLog.innerHTML += `<div class="text-left text-green-300 my-1">AI: ${data.reply}</div>`;
                chatLog.scrollTop = chatLog.scrollHeight;
            } catch (err) {
                chatLog.innerHTML += `<div class="text-left text-red-400">Error: Server unreachable</div>`;
            }
        };
    </script>

    <!-- Three.js Background -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("bg-canvas"), alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.position.z = 25;

        const geometry = new THREE.BufferGeometry();
        const count = 1200;
        const positions = new Float32Array(count * 3);
        for (let i = 0; i < count; i++) {
            positions[i*3] = (Math.random() - 0.5) * 100;
            positions[i*3+1] = (Math.random() - 0.5) * 60;
            positions[i*3+2] = (Math.random() - 0.5) * 50;
        }
        geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
        const material = new THREE.PointsMaterial({ color: 0x3b82f6, size: 0.2 });
        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        function animate() {
            requestAnimationFrame(animate);
            particles.rotation.x += 0.0003;
            particles.rotation.y += 0.0007;
            renderer.render(scene, camera);
        }
        animate();
        window.addEventListener("resize", () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
