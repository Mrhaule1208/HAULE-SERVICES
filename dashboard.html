<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Mr. Haule Services</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      font-family: 'Times New Roman', Times, serif;
    }
    body {
      background: #f0f9ff;
    }
    h1, h2, h3, .font-bold, .gradient-text {
      font-family: 'Times New Roman', Times, serif;
      font-weight: 700;
    }
    .glass-card {
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(8px);
      border-radius: 1.5rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      border: 1px solid rgba(59,130,246,0.2);
    }
    .toast-3d {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #2563eb, #1e40af);
      color: white;
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: 600;
      z-index: 2000;
      animation: fadeUp 0.3s;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    .gradient-text {
      background: linear-gradient(135deg, #1e3c2c, #1e40af, #2563eb);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .site-header {
      text-align: center;
      padding: 1rem 0 0.5rem;
      background: white;
      border-bottom: 1px solid #e5e7eb;
    }
    .nav-bar {
      background: white;
      border-bottom: 1px solid #e5e7eb;
      padding: 0.75rem 1rem;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>

<div class="site-header">
  <div class="flex justify-center items-center gap-3">
    <img src="logo.jpg" alt="Logo" class="w-12 h-12 rounded-full border-2 border-blue-500" onerror="this.onerror=null; this.src='https://placehold.co/50x50/1e3c2c/white?text=MH';">
    <span class="text-3xl md:text-4xl font-extrabold gradient-text">MR. HAULE SERVICES</span>
  </div>
</div>

<div class="nav-bar sticky top-0 z-40 shadow-sm">
  <div class="max-w-6xl mx-auto flex flex-wrap items-center justify-between gap-3">
    <div class="flex gap-4">
      <button onclick="window.location.href='index.html'" class="text-blue-600 hover:text-blue-800"><i class="fas fa-home"></i> Home</button>
    </div>
    <div class="flex gap-3">
      <a id="admin-btn" href="admin.html" class="bg-purple-600 text-white px-5 py-2 rounded-full shadow-md hover:bg-purple-700 hidden"><i class="fas fa-crown"></i> Admin</a>
      <button id="logout-btn" class="bg-red-600 text-white px-5 py-2 rounded-full shadow hover:bg-red-700"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </div>
</div>

<div class="max-w-6xl mx-auto p-4">
  <div class="mb-6">
    <h1 class="text-3xl font-bold gradient-text">Welcome, <span id="user-name">User</span></h1>
  </div>

  <!-- Profile Edit -->
  <div class="glass-card p-6 mb-8">
    <h2 class="text-2xl font-bold mb-4 text-blue-800">Edit Your Profile</h2>
    <form id="profile-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <input type="text" id="profile-name" placeholder="Full Name" class="p-3 rounded-xl border border-blue-200" required>
      <input type="email" id="profile-email" placeholder="Email" class="p-3 rounded-xl border border-blue-200" required>
      <input type="tel" id="profile-phone" placeholder="+255XXXXXXXXX" class="p-3 rounded-xl border border-blue-200" required>
      <select id="profile-gender" class="p-3 rounded-xl border border-blue-200">
        <option>Male</option><option>Female</option><option>Other</option>
      </select>
      <button type="submit" class="bg-blue-600 text-white py-3 rounded-xl font-bold col-span-2 hover:bg-blue-700">Update Profile</button>
    </form>
  </div>

  <!-- Request Form with Detailed Service Options -->
  <div class="glass-card p-6 mb-8">
    <h2 class="text-2xl font-bold mb-4 text-blue-800">Submit a New Request</h2>
    <form id="request-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <input type="text" id="fullname" placeholder="Full Name" readonly class="bg-gray-100 p-3 rounded-xl border border-blue-200">
      <input type="email" id="email" readonly class="bg-gray-100 p-3 rounded-xl border border-blue-200">
      <input type="tel" id="phone" placeholder="+255XXXXXXXXX" class="p-3 rounded-xl border border-blue-200" required>
      <select id="gender" class="p-3 rounded-xl border border-blue-200"><option>Male</option><option>Female</option><option>Other</option></select>
      
      <select id="service" class="p-3 rounded-xl border border-blue-200" required>
        <option value="">Chagua Huduma na Aina</option>
        <!-- HESLB -->
        <option value="HESLB - Maombi ya Mkopo">HESLB - Maombi ya Mkopo (TZS 10,000)</option>
        <option value="HESLB - Marekebisho ya Taarifa">HESLB - Marekebisho ya Taarifa (TZS 10,000)</option>
        <option value="HESLB - Uhakiki wa Nyaraka">HESLB - Uhakiki wa Nyaraka (TZS 5,000)</option>
        <option value="HESLB - Mwongozo wa Maombi">HESLB - Mwongozo wa Maombi (TZS 5,000)</option>
        <!-- RITA -->
        <option value="RITA - Vyeti vya Kuzaliwa/Kifo">RITA - Vyeti vya Kuzaliwa/Kifo (TZS 10,000)</option>
        <option value="RITA - Marekebisho ya Taarifa">RITA - Marekebisho ya Taarifa (TZS 8,000)</option>
        <option value="RITA - Ufuatiliaji wa Vyeti">RITA - Ufuatiliaji wa Vyeti (TZS 5,000)</option>
        <!-- NIDA -->
        <option value="NIDA - Usajili">NIDA - Usajili (TZS 10,000)</option>
        <option value="NIDA - Marekebisho ya Taarifa">NIDA - Marekebisho ya Taarifa (TZS 8,000)</option>
        <option value="NIDA - Namba ya NIDA">NIDA - Namba ya NIDA (TZS 5,000)</option>
        <!-- University Applications -->
        <option value="University Applications - Maombi ya Udahili">University Applications - Maombi ya Udahili (TZS 10,000)</option>
        <option value="University Applications - Uchaguzi wa Kozi">University Applications - Uchaguzi wa Kozi (TZS 5,000)</option>
        <option value="University Applications - Mwongozo wa Vyuo">University Applications - Mwongozo wa Vyuo (TZS 5,000)</option>
        <!-- Academic Work -->
        <option value="Academic Work - Field Report">Academic Work - Field Report (TZS 15,000)</option>
        <option value="Academic Work - Assignments">Academic Work - Assignments (TZS 500/ukurasa)</option>
        <option value="Academic Work - Research">Academic Work - Research (TZS 20,000)</option>
        <option value="Academic Work - Presentations">Academic Work - Presentations (TZS 10,000)</option>
        <option value="Academic Work - Barua Rasmi">Academic Work - Barua Rasmi (TZS 5,000)</option>
        <!-- Computer Maintenance & IT Support -->
        <option value="IT Support - Kupiga Windows">IT Support - Kupiga Windows (TZS 15,000)</option>
        <option value="IT Support - Kuformat PC/Laptop">IT Support - Kuformat PC/Laptop (TZS 10,000)</option>
        <option value="IT Support - Kuweka Antivirus na Kuondoa Virus">IT Support - Kuweka Antivirus na Kuondoa Virus (TZS 10,000)</option>
        <option value="IT Support - Kurepair Files Zilizoharibika">IT Support - Kurepair Files Zilizoharibika (TZS 8,000)</option>
        <option value="IT Support - Kuongeza Speed ya PC/Laptop">IT Support - Kuongeza Speed ya PC/Laptop (TZS 5,000)</option>
        <option value="IT Support - Kuinstall Software Muhimu">IT Support - Kuinstall Software Muhimu (TZS 5,000)</option>
        <option value="IT Support - Kurekebisha Errors za Mfumo">IT Support - Kurekebisha Errors za Mfumo (TZS 10,000)</option>
        <option value="IT Support - Backup na Restore Mafaili">IT Support - Backup na Restore Mafaili (TZS 8,000)</option>
        <option value="IT Support - Kusafisha PC na Kuboresha Performance">IT Support - Kusafisha PC na Kuboresha Performance (TZS 5,000)</option>
        <option value="IT Support - Huduma Nyingine za IT">IT Support - Huduma Nyingine za IT (TZS 20,000)</option>
        <!-- TIN NUMBER -->
        <option value="TIN NUMBER - Usajili">TIN NUMBER - Usajili (TZS 15,000)</option>
        <option value="TIN NUMBER - Marekebisho">TIN NUMBER - Marekebisho (TZS 10,000)</option>
        <!-- LOSS REPORT -->
        <option value="LOSS REPORT - Taarifa ya Hasara">LOSS REPORT - Taarifa ya Hasara (TZS 20,000)</option>
        <option value="LOSS REPORT - Ufuatiliaji">LOSS REPORT - Ufuatiliaji (TZS 10,000)</option>
      </select>

      <textarea id="details" rows="3" placeholder="Maelezo ya ziada (kama maelezo maalum)" class="p-3 rounded-xl border border-blue-200 col-span-2"></textarea>
      <input type="file" id="file-upload" accept=".jpg,.png,.pdf,.docx" class="col-span-2">
      <button type="submit" class="bg-blue-600 text-white py-3 rounded-xl font-bold col-span-2 hover:bg-blue-700"><i class="fas fa-paper-plane"></i> Tuma Ombi & WhatsApp</button>
    </form>
  </div>

  <!-- Payment Methods -->
  <div class="glass-card p-6 mb-8">
    <h2 class="text-2xl font-bold mb-4 text-blue-800">Njia za Malipo</h2>
    <div class="grid sm:grid-cols-2 gap-4">
      <div><i class="fas fa-mobile-alt text-blue-600"></i> <strong>VODA LIPA:</strong> 59183849</div>
      <div><i class="fas fa-mobile-alt text-blue-600"></i> <strong>TIGO LIPA:</strong> 45198490</div>
      <div><i class="fas fa-mobile-alt text-blue-600"></i> <strong>AIRTEL LIPA:</strong> 65525676</div>
      <div><i class="fab fa-whatsapp text-blue-600"></i> <strong>HALOPESA:</strong> +255625568661</div>
    </div>
    <p class="mt-4 text-gray-700">Mpokeaji: AMANI ERASMUCE HAULE</p>
  </div>

  <!-- Request History -->
  <div class="glass-card p-6">
    <h2 class="text-2xl font-bold mb-4 text-blue-800">Historia ya Maombi Yako</h2>
    <div id="history-list" class="space-y-3"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
  import { getDatabase, ref, get, set, push, remove, update } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";
  import { getStorage, ref as storageRef, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAOpjaV41QyCJGO_ptv_gmD_MYFWCcSA6k",
    authDomain: "haule-81f1d.firebaseapp.com",
    databaseURL: "https://haule-81f1d-default-rtdb.firebaseio.com",
    projectId: "haule-81f1d",
    storageBucket: "haule-81f1d.firebasestorage.app",
    messagingSenderId: "612778536991",
    appId: "1:612778536991:web:d6c6fb2495984de7fd652a"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  const storage = getStorage(app);

  let currentUser = null;
  let userData = {};

  function showToast(msg, isError = false) {
    const toast = document.createElement('div');
    toast.className = 'toast-3d';
    if (isError) toast.style.background = "linear-gradient(135deg, #ef4444, #b91c1c)";
    else toast.style.background = "linear-gradient(135deg, #2563eb, #1e40af)";
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'index.html'; return; }
    currentUser = user;
    const userSnap = await get(ref(db, `users/${user.uid}`));
    if (userSnap.exists()) userData = userSnap.val();
    document.getElementById('user-name').innerText = userData.fullName || user.email;
    document.getElementById('profile-name').value = userData.fullName || '';
    document.getElementById('profile-email').value = user.email;
    document.getElementById('profile-phone').value = userData.phone || '';
    document.getElementById('profile-gender').value = userData.gender || 'Male';
    document.getElementById('fullname').value = userData.fullName || '';
    document.getElementById('email').value = user.email;
    document.getElementById('phone').value = userData.phone || '';
    document.getElementById('gender').value = userData.gender || 'Male';
    const adminBtn = document.getElementById('admin-btn');
    if (user.email === 'hamanierasmuce@gmail.com') {
      if (adminBtn) adminBtn.classList.remove('hidden');
    } else {
      if (adminBtn) adminBtn.classList.add('hidden');
    }
    loadHistory();
  });

  document.getElementById('profile-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fullName = document.getElementById('profile-name').value;
    const email = document.getElementById('profile-email').value;
    const phone = document.getElementById('profile-phone').value;
    const gender = document.getElementById('profile-gender').value;
    if (!/^\+255[0-9]{9}$/.test(phone)) { showToast('Phone must be +255XXXXXXXXX', true); return; }
    try {
      await set(ref(db, `users/${currentUser.uid}`), { fullName, email, phone, gender, uid: currentUser.uid });
      userData = { fullName, email, phone, gender };
      showToast('Profile updated successfully!');
      document.getElementById('user-name').innerText = fullName;
      document.getElementById('fullname').value = fullName;
      document.getElementById('phone').value = phone;
      document.getElementById('gender').value = gender;
    } catch (err) { showToast(err.message, true); }
  });

  async function loadHistory() {
    const reqRef = ref(db, `requests/${currentUser.uid}`);
    const snapshot = await get(reqRef);
    const container = document.getElementById('history-list');
    container.innerHTML = '';
    if (!snapshot.exists()) { container.innerHTML = '<p class="text-gray-500">Hakuna maombi bado.</p>'; return; }
    const requests = snapshot.val();
    Object.entries(requests).forEach(([id, req]) => {
      const div = document.createElement('div');
      div.className = 'bg-white p-4 rounded-xl shadow-sm flex justify-between items-center';
      div.innerHTML = `
        <div><strong>${req.service}</strong> - ${req.amount} TZS<br><span class="text-sm">Hali: ${req.status || 'Pending'}</span><br><span class="text-xs">${new Date(req.date).toLocaleString()}</span></div>
        <button onclick="deleteRequest('${id}')" class="text-red-600"><i class="fas fa-trash"></i></button>
      `;
      container.appendChild(div);
    });
  }

  window.deleteRequest = async (reqId) => {
    await remove(ref(db, `requests/${currentUser.uid}/${reqId}`));
    await remove(ref(db, `allRequests/${reqId}`));
    showToast('✅ Ombi limefutwa!');
    loadHistory();
  };

  document.getElementById('request-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const phone = document.getElementById('phone').value;
    if (!/^\+255[0-9]{9}$/.test(phone)) { showToast('Nambari ya simu lazima iwe +255XXXXXXXXX', true); return; }
    const serviceFull = document.getElementById('service').value;
    if (!serviceFull) { showToast('Chagua huduma', true); return; }
    // Extract service and amount from option text
    const amountMatch = serviceFull.match(/\(TZS\s([0-9,]+)(?:\/ukurasa)?\)/);
    let amount = amountMatch ? amountMatch[1] : '0';
    // If per page, keep as is
    if (serviceFull.includes('/ukurasa')) amount = amount + '/page';
    const service = serviceFull.split(' (TZS')[0];
    const details = document.getElementById('details').value;
    const file = document.getElementById('file-upload').files[0];
    let fileUrl = '';
    if (file) {
      const storagePath = storageRef(storage, `requests/${currentUser.uid}/${Date.now()}_${file.name}`);
      await uploadBytesResumable(storagePath, file);
      fileUrl = await getDownloadURL(storagePath);
    }
    const requestData = {
      userId: currentUser.uid,
      userName: userData.fullName,
      email: currentUser.email,
      phone,
      gender: document.getElementById('gender').value,
      service,
      amount,
      details,
      fileUrl,
      fileName: file ? file.name : '',
      status: 'Pending',
      date: Date.now()
    };
    const newReqRef = push(ref(db, `requests/${currentUser.uid}`));
    await set(newReqRef, requestData);
    await set(ref(db, `allRequests/${newReqRef.key}`), { ...requestData, requestId: newReqRef.key });
    const msg = `📢 OMBI JIPYA 📢\n\n👤 Jina: ${userData.fullName}\n📧 Barua pepe: ${currentUser.email}\n📞 Simu: ${phone}\n🛠️ Huduma: ${service}\n💰 Kiasi: ${amount} TZS\n📝 Maelezo: ${details}\n📎 Faili: ${file ? file.name : 'Hakuna faili'}\n🔗 Kiungo: ${fileUrl || 'Hakuna'}`;
    const whatsappUrl = `https://wa.me/255625568661?text=${encodeURIComponent(msg)}`;
    window.open(whatsappUrl, '_blank');
    showToast('Ombi limetumwa! WhatsApp itafunguka.');
    document.getElementById('request-form').reset();
    document.getElementById('file-upload').value = '';
    loadHistory();
  });

  document.getElementById('logout-btn').onclick = () => { signOut(auth); window.location.href = 'index.html'; };
</script>
</body>
</html>
