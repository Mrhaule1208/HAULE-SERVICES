<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<h1 class="text-2xl font-bold mb-4">Dashboard</h1>

<input id="service" placeholder="Service" class="border p-2 mb-2">
<input id="code" placeholder="Payment Code" class="border p-2 mb-2">

<button onclick="send()" class="bg-blue-600 text-white px-4 py-2">Submit</button>

<div class="mt-6">
<input id="msg" placeholder="Ask AI..." class="border p-2">
<button onclick="chat()" class="bg-green-600 text-white px-3 py-1">Send</button>
</div>

<div id="chat"></div>

<script>
async function chat(){
const r = await fetch("http://localhost:3000/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:msg.value})});
const d = await r.json();
chat.innerHTML += "<p>"+d.reply+"</p>";
}
</script>

</body>
</html>
