<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weka Upya Nywila | MR. HAULE SERVICES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { background: #f0f9ff; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; border-radius: 24px; padding: 2rem; max-width: 450px; box-shadow: 0 20px 30px rgba(0,0,0,0.1); }
        .password-toggle { position: relative; }
        .toggle-password { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="text-2xl font-bold text-blue-800 mb-4">Weka Upya Nywila</h1>
        <div id="resetForm">
            <div class="password-toggle relative mb-3">
                <input type="password" id="newPassword" placeholder="Nywila mpya" class="w-full border rounded-lg p-2">
                <i class="fas fa-eye-slash toggle-password" data-target="newPassword"></i>
            </div>
            <div class="password-toggle relative mb-3">
                <input type="password" id="confirmPassword" placeholder="Thibitisha nywila mpya" class="w-full border rounded-lg p-2">
                <i class="fas fa-eye-slash toggle-password" data-target="confirmPassword"></i>
            </div>
            <button id="resetBtn" class="bg-blue-600 text-white w-full py-2 rounded-full font-semibold">Badilisha Nywila</button>
        </div>
        <div id="message" class="mt-4 text-center text-sm"></div>
    </div>
    <script>
        document.querySelectorAll('.toggle-password').forEach(icon => {
            icon.addEventListener('click', function() {
                const input = document.getElementById(this.getAttribute('data-target'));
                if (input.type === 'password') { input.type = 'text'; this.classList.remove('fa-eye-slash'); this.classList.add('fa-eye'); }
                else { input.type = 'password'; this.classList.remove('fa-eye'); this.classList.add('fa-eye-slash'); }
            });
        });
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const email = urlParams.get('email');
        const resetBtn = document.getElementById('resetBtn');
        const messageDiv = document.getElementById('message');
        resetBtn.onclick = async () => {
            const newPassword = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            if (!newPassword || !confirm) { messageDiv.innerHTML = '<span class="text-red-500">Jaza sehemu zote.</span>'; return; }
            if (newPassword !== confirm) { messageDiv.innerHTML = '<span class="text-red-500">Nywila hazifanani.</span>'; return; }
            try {
                const res = await fetch('https://your-backend-url.onrender.com/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, token, newPassword })
                });
                const data = await res.json();
                if (data.success) messageDiv.innerHTML = `<span class="text-green-600">${data.message} <a href="index.html" class="underline">Ingia sasa</a></span>`;
                else messageDiv.innerHTML = `<span class="text-red-500">${data.message}</span>`;
            } catch (err) { messageDiv.innerHTML = '<span class="text-red-500">Hitilafu ya server. Jaribu tena.</span>'; }
        };
    </script>
</body>
</html>
