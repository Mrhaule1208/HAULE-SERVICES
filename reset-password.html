<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Weka Upya Nenosiri - MR. HAULE ORGANIZATION</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="progress-bar" id="progressBar"></div>
<canvas id="particles-bg"></canvas>

<header class="header">
    <div class="header-content">
        <div class="logo">
            <img src="images/logo.png" alt="Logo" id="logoImg" onerror="this.src='https://via.placeholder.com/60x60?text=HA'">
            <h1>MR. HAULE <span style="color:#00ffff;">ORGANIZATION</span></h1>
        </div>
        <nav class="nav-menu">
            <a href="index.html" data-key="home">Nyumbani</a>
            <a href="login.html" data-key="login">Ingia</a>
            <a href="register.html" data-key="register">Jisajili</a>
        </nav>
        <div class="lang-switch">
            <button class="lang-btn active" data-lang="sw">SW</button>
            <button class="lang-btn" data-lang="en">EN</button>
        </div>
    </div>
</header>

<main>
    <div class="glass-container" style="max-width: 450px;">
        <div style="text-align: center;">
            <i class="fas fa-key" style="font-size: 4rem; color: #00ffff; margin-bottom: 15px;"></i>
            <h2 style="margin-bottom: 10px;" data-key="resetTitle">Weka Upya Nenosiri</h2>
            <p style="margin-bottom: 30px; color: rgba(255,255,255,0.7);" data-key="resetMsg">
                Tuma barua pepe yako, tutakutumia link ya kuweka upya nenosiri lako
            </p>
        </div>

        <form id="resetForm">
            <div style="margin-bottom: 25px;">
                <label style="display: block; margin-bottom: 8px;" data-key="emailLabel">Barua pepe (Email)</label>
                <input type="email" id="resetEmail" placeholder="hamanierasmuce@gmail.com" required 
                       style="width: 100%; padding: 14px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 16px; color: #fff;">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px;" data-key="sendBtn">
                <i class="fas fa-paper-plane"></i> Tuma Link ya Kuweka Upya
            </button>
        </form>

        <p style="text-align: center; margin-top: 25px;">
            <a href="login.html" style="color: #00ffff; text-decoration: none;" data-key="backToLogin">
                <i class="fas fa-arrow-left"></i> Rudi kwenye Kuingia
            </a>
        </p>
    </div>
</main>

<footer class="footer">
    <div class="copyright">
        &copy; 2026 MR. HAULE ORGANIZATION. All Rights Reserved.
    </div>
</footer>

<script src="firebase-config.js"></script>
<script>
    // Handle password reset
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('resetEmail').value;

        if(!email) {
            showToast('Tafadhali jaza barua pepe yako', 'error');
            return;
        }

        if(!email.includes('@')) {
            showToast('Barua pepe sio sahihi!', 'error');
            return;
        }

        // Show loading
        const btn = document.querySelector('#resetForm button[type="submit"]');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Inatuma...';
        btn.disabled = true;

        try {
            const auth = window.firebase.auth;
            const { sendPasswordResetEmail } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js");
            
            // Send password reset email
            await sendPasswordResetEmail(auth, email);
            
            // Show success message with 3D popup effect
            show3DSuccessModal(email);
            
        } catch (error) {
            console.error(error);
            let errorMessage = 'Imeshindikana kutuma link. Jaribu tena.';
            if(error.code === 'auth/user-not-found') {
                errorMessage = 'Hakuna akaunti iliyopatikana kwa barua pepe hii!';
            } else if(error.code === 'auth/invalid-email') {
                errorMessage = 'Barua pepe sio sahihi!';
            } else if(error.code === 'auth/too-many-requests') {
                errorMessage = 'Majaribio mengi sana. Jaribu baadaye.';
            }
            showToast(errorMessage, 'error');
        } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    });

    function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function show3DSuccessModal(email) {
        // Create 3D modal
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.style.display = 'flex';
        modal.style.animation = 'fadeIn 0.3s ease';
        
        modal.innerHTML = `
            <div class="modal-content" style="text-align: center; max-width: 400px;">
                <i class="fas fa-envelope-open-text" style="font-size: 4rem; color: #00ff88; margin-bottom: 20px;"></i>
                <h3 style="color: #00ff88; margin-bottom: 15px;">✅ Link Imetumwa!</h3>
                <p style="margin-bottom: 20px;">Tumekutumia link ya kuweka upya nenosiri lako kwenye:</p>
                <p style="background: rgba(0,255,255,0.1); padding: 10px; border-radius: 12px; margin-bottom: 20px; word-break: break-all;">
                    <strong>${email}</strong>
                </p>
                <p style="margin-bottom: 20px; color: rgba(255,255,255,0.7); font-size: 0.9rem;">
                    Tafadhali angalia inbox yako au folder ya spam (taka taka).<br>
                    Link itakua halali kwa dakika 60 tu.
                </p>
                <button class="btn btn-primary" onclick="this.closest('.modal').remove()">
                    <i class="fas fa-check"></i> Nimeelewa
                </button>
                <button class="btn btn-secondary" onclick="window.location.href='login.html'" style="margin-top: 10px;">
                    <i class="fas fa-sign-in-alt"></i> Nenda Kuingia
                </button>
            </div>
        `;
        
        document.body.appendChild(modal);
        
        // Close modal when clicking outside
        modal.addEventListener('click', (e) => {
            if(e.target === modal) modal.remove();
        });
    }

    // Auto-fill email from login page if available
    window.addEventListener('DOMContentLoaded', () => {
        const rememberedEmail = localStorage.getItem('userEmail');
        if(rememberedEmail) {
            document.getElementById('resetEmail').value = rememberedEmail;
        }
    });

    // Language translations
    const translations = {
        sw: {
            home: 'Nyumbani', login: 'Ingia', register: 'Jisajili',
            resetTitle: 'Weka Upya Nenosiri',
            resetMsg: 'Tuma barua pepe yako, tutakutumia link ya kuweka upya nenosiri lako',
            emailLabel: 'Barua pepe (Email)',
            sendBtn: 'Tuma Link ya Kuweka Upya',
            backToLogin: 'Rudi kwenye Kuingia'
        },
        en: {
            home: 'Home', login: 'Login', register: 'Register',
            resetTitle: 'Reset Password',
            resetMsg: 'Enter your email address and we\'ll send you a link to reset your password',
            emailLabel: 'Email Address',
            sendBtn: 'Send Reset Link',
            backToLogin: 'Back to Login'
        }
    };

    let currentLang = 'sw';
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            currentLang = btn.dataset.lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.dataset.key;
                if(translations[currentLang][key]) el.textContent = translations[currentLang][key];
            });
        });
    });

    // Particle background
    const canvas = document.getElementById('particles-bg');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let particles = [];
    for(let i = 0; i < 50; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            radius: Math.random() * 3 + 1,
            speedX: (Math.random() - 0.5) * 0.5,
            speedY: (Math.random() - 0.5) * 0.5
        });
    }
    function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'rgba(0, 255, 255, 0.5)';
        particles.forEach(p => {
            p.x += p.speedX;
            p.y += p.speedY;
            if(p.x < 0) p.x = canvas.width;
            if(p.x > canvas.width) p.x = 0;
            if(p.y < 0) p.y = canvas.height;
            if(p.y > canvas.height) p.y = 0;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fill();
        });
        requestAnimationFrame(animateParticles);
    }
    animateParticles();
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    // Progress bar
    window.addEventListener('scroll', () => {
        const winScroll = document.documentElement.scrollTop;
        const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        const scrolled = (winScroll / height) * 100;
        document.getElementById('progressBar').style.width = scrolled + '%';
    });
</script>
</body>
</html>
