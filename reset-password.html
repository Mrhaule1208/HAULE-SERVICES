<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weka Upya Nenosiri - MR. HAULE ORGANIZATION</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="wave-overlay"></div>
<div class="particles" id="particles"></div>

<header class="header">
    <div class="header-content">
        <div class="logo"><div class="logo-img">HA</div><h1>MR. HAULE ORGANIZATION</h1></div>
        <nav class="nav-menu">
            <a href="index.html">Nyumbani</a>
            <a href="login.html">Ingia</a>
        </nav>
    </div>
</header>

<main>
    <div class="glass-container" style="max-width: 450px;">
        <div style="text-align:center;"><i class="fas fa-key" style="font-size:4rem;"></i><h2>Weka Upya Nenosiri</h2></div>
        <form id="resetForm">
            <input type="email" id="email" placeholder="Barua pepe yako" required>
            <button type="submit" class="btn btn-primary" style="width:100%;">Tuma Link</button>
        </form>
        <p style="text-align:center; margin-top:20px;"><a href="login.html" style="color:#fff;">Rudi kwenye Kuingia</a></p>
    </div>
</main>

<script src="firebase-config.js"></script>
<script>
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const btn = e.target.querySelector('button');
        btn.innerHTML = 'Inatuma...';
        btn.disabled = true;
        try {
            await firebase.auth().sendPasswordResetEmail(email);
            alert('Link ya kuweka upya nenosiri imetumwa kwenye barua pepe yako!');
            window.location.href = 'login.html';
        } catch (error) {
            alert(error.message);
        } finally {
            btn.innerHTML = 'Tuma Link';
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
