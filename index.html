<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Mr. Haule Services | Academic & IT Support</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    html { scroll-behavior: smooth; }
    /* 3D Modal Styles */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background-color: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      z-index: 60;
      display: none;
      align-items: center;
      justify-content: center;
      perspective: 1200px;
    }
    .modal-card {
      background: linear-gradient(135deg, #ffffff 0%, #f0f4ff 100%);
      border-radius: 2rem;
      max-width: 90%;
      width: 440px;
      padding: 1.8rem;
      box-shadow: 0 25px 45px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.5), 0 0 0 2px rgba(0,0,0,0.1);
      transform: translateZ(40px) rotateX(2deg);
      animation: modalPop 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    @keyframes modalPop {
      0% { transform: translateZ(-80px) rotateX(5deg); opacity: 0; }
      100% { transform: translateZ(40px) rotateX(2deg); opacity: 1; }
    }
    .modal-card:hover {
      transform: translateZ(50px) rotateX(1deg);
      box-shadow: 0 30px 55px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.6);
    }
    /* 3D Toast */
    .toast-3d {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: linear-gradient(135deg, #1e88e5, #10b981, #f59e0b);
      background-size: 200% 200%;
      animation: gradientShift 3s ease infinite, slideIn 0.4s ease-out, float 3s ease-in-out infinite;
      color: white;
      padding: 12px 24px;
      border-radius: 60px;
      font-weight: bold;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3), 0 0 0 2px rgba(255,255,255,0.2);
      backdrop-filter: blur(4px);
      z-index: 2000;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 12px;
      transform-style: preserve-3d;
      transform: translateZ(30px) rotateX(2deg);
      cursor: pointer;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes slideIn {
      from { transform: translateX(100%) translateZ(0); opacity: 0; }
      to { transform: translateX(0) translateZ(30px); opacity: 1; }
    }
    @keyframes float {
      0% { transform: translateY(0px) translateZ(30px); }
      50% { transform: translateY(-8px) translateZ(40px); }
      100% { transform: translateY(0px) translateZ(30px); }
    }
    /* Chat widget */
    .chat-widget {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 50;
      width: 280px;
      background: white;
      border-radius: 1rem;
      box-shadow: 0 20px 30px rgba(0,0,0,0.2), 0 0 0 1px rgba(255,255,255,0.3);
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-header {
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      color: white;
      padding: 0.75rem 1rem;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .chat-messages {
      height: 280px;
      overflow-y: auto;
      padding: 0.75rem;
      background: #f9fafb;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .chat-input-area {
      display: flex;
      border-top: 1px solid #e5e7eb;
    }
    .chat-input-area input {
      flex: 1;
      padding: 0.6rem;
      border: none;
      outline: none;
    }
    .chat-input-area button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 0.6rem 1rem;
      cursor: pointer;
    }
    .message {
      max-width: 85%;
      padding: 0.5rem 0.75rem;
      border-radius: 1rem;
      font-size: 0.8rem;
    }
    .user-message { background: #2563eb; color: white; align-self: flex-end; border-bottom-right-radius: 0.25rem; }
    .bot-message { background: #e5e7eb; color: #1f2937; align-self: flex-start; border-bottom-left-radius: 0.25rem; }
    .chat-toggle-btn {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      color: white;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2), 0 0 0 2px rgba(255,255,255,0.2);
      cursor: pointer;
      z-index: 40;
      transition: transform 0.2s;
    }
    .chat-toggle-btn:hover { transform: scale(1.05); }
    @media (max-width: 640px) {
      .chat-widget { width: 260px; }
      .chat-toggle-btn { width: 48px; height: 48px; }
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800">

<div id="app">
  <nav class="bg-white shadow-md sticky top-0 z-30">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center py-3">
        <div class="flex items-center space-x-2 cursor-pointer" onclick="navigate('landing')">
          <!-- Logo image -->
          <img src="logo.jpg" alt="Mr. Haule Logo" class="h-12 w-auto object-contain" onerror="this.src='https://placehold.co/48x48?text=HA'">
          <span class="font-bold text-xl text-gray-800">Mr. Haule Services</span>
        </div>
        <div class="hidden md:flex space-x-6 items-center" id="navLinksDesktop"></div>
        <div class="md:hidden">
          <button id="mobile-menu-btn" class="text-gray-600 focus:outline-none">
            <i class="fas fa-bars text-2xl"></i>
          </button>
        </div>
      </div>
      <div id="mobile-menu" class="hidden md:hidden pb-4 space-y-2"></div>
    </div>
  </nav>
  <div id="mainContent"></div>
</div>

<!-- Modal Backdrop -->
<div id="modalBackdrop" class="modal-backdrop">
  <div class="modal-card">
    <div class="flex justify-between items-center mb-4">
      <h3 id="modalTitle" class="text-xl font-bold text-gray-800">Login</h3>
      <button onclick="closeModal()" class="text-gray-500 hover:text-gray-700 text-xl"><i class="fas fa-times"></i></button>
    </div>
    <form id="modalForm">
      <div id="modalContent"></div>
      <div id="modalError" class="text-red-500 text-sm mt-2"></div>
      <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white py-2 rounded-full mt-4 transition transform hover:scale-105">Submit</button>
    </form>
    <p id="modalFooterText" class="text-sm text-center mt-4 text-gray-500"></p>
  </div>
</div>

<!-- Chat Widget -->
<div id="chatWidget" class="chat-widget">
  <div class="chat-header" onclick="toggleChat()"><span><i class="fas fa-robot mr-2"></i> AI Assistant</span><i class="fas fa-chevron-down"></i></div>
  <div class="chat-messages" id="chatMessages"><div class="message bot-message">Hello! I'm Mr. Haule AI Assistant. Ask me about HESLB, RITA, NIDA, IT support, or our services.</div></div>
  <div class="chat-input-area"><input type="text" id="chatInput" placeholder="Type your question..." onkeypress="if(event.key==='Enter') sendChatMessage()"><button onclick="sendChatMessage()"><i class="fas fa-paper-plane"></i></button></div>
</div>
<div class="chat-toggle-btn" onclick="toggleChat()"><i class="fas fa-comment-dots text-xl"></i></div>

<script>
  // Firebase Config
  const firebaseConfig = {
    apiKey: "AIzaSyCd9YkUhHSWQo4xqqGbFKZDS6gz03io_r8",
    authDomain: "mr-haule.firebaseapp.com",
    databaseURL: "https://mr-haule-default-rtdb.firebaseio.com",
    projectId: "mr-haule",
    storageBucket: "mr-haule.firebasestorage.app",
    messagingSenderId: "802356815152",
    appId: "1:802356815152:web:35b6daccd12376591b54f5",
    measurementId: "G-TQ1GJ67KGR"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();
  const storage = firebase.storage();

  // Local storage keys
  const CURRENT_USER_KEY = 'mrhaule_current';
  const REQUESTS_KEY = 'mrhaule_requests';
  const PAYMENTS_KEY = 'mrhaule_payments';

  function getCurrentUser() { return JSON.parse(localStorage.getItem(CURRENT_USER_KEY) || 'null'); }
  function setCurrentUser(user) { localStorage.setItem(CURRENT_USER_KEY, JSON.stringify(user)); }
  function logout() { localStorage.removeItem(CURRENT_USER_KEY); navigate('landing'); }

  let currentPage = 'landing';
  let currentUser = getCurrentUser();

  // Auth state listener
  auth.onAuthStateChanged(async (firebaseUser) => {
    if (firebaseUser) {
      const snapshot = await db.ref(`users/${firebaseUser.uid}`).once('value');
      const userData = snapshot.val() || {};
      const localUser = {
        uid: firebaseUser.uid,
        fullName: userData.fullName || firebaseUser.displayName || firebaseUser.email,
        email: firebaseUser.email,
        phone: userData.phoneNumber || ''
      };
      setCurrentUser(localUser);
      currentUser = localUser;
      if (currentPage === 'landing' || currentPage === 'login' || currentPage === 'register') navigate('home');
      else renderContent();
    } else {
      currentUser = null;
      if (currentPage !== 'landing' && currentPage !== 'login' && currentPage !== 'register' && currentPage !== 'forgot')
        navigate('landing');
      else renderContent();
    }
    renderNav();
  });

  function navigate(page) {
    currentPage = page;
    renderNav();
    renderContent();
  }

  function renderNav() {
    const isLoggedIn = currentUser !== null;
    const isAdmin = isLoggedIn && currentUser.email === 'hamanierasmuce@gmail.com';
    const desktopNav = document.getElementById('navLinksDesktop');
    const mobileMenu = document.getElementById('mobile-menu');
    let links = [];
    if (!isLoggedIn) {
      links = [
        { label: 'Home', action: () => navigate('landing') },
        { label: 'Services', action: () => scrollToServices() },
        { label: 'Testimonials', action: () => scrollToTestimonials() },
        { label: 'Contact', action: () => scrollToContact() },
        { label: 'Login', action: () => openModal('login') },
        { label: 'Get Started', action: () => openModal('register'), primary: true }
      ];
    } else {
      links = [
        { label: 'Home', action: () => navigate('home') },
        { label: 'Dashboard', action: () => navigate('dashboard') },
        { label: 'Payment', action: () => navigate('payment') }
      ];
      if (isAdmin) links.push({ label: 'Admin', action: () => navigate('admin') });
      links.push({ label: 'Logout', action: logout, danger: true });
    }
    desktopNav.innerHTML = links.map(link => {
      if (link.primary) return `<button onclick="openModal('register')" class="bg-blue-600 text-white px-4 py-2 rounded-full hover:bg-blue-700 transition">${link.label}</button>`;
      if (link.danger) return `<button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded-full hover:bg-red-600 transition">${link.label}</button>`;
      return `<a href="#" onclick="${link.action.toString().includes('scroll') ? link.action.toString() : `navigate('${link.label.toLowerCase()}')`}" class="text-gray-600 hover:text-blue-600 transition">${link.label}</a>`;
    }).join('');
    mobileMenu.innerHTML = links.map(link => {
      if (link.primary) return `<button onclick="openModal('register')" class="bg-blue-600 text-white px-4 py-2 rounded-full w-full">${link.label}</button>`;
      if (link.danger) return `<button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded-full w-full">${link.label}</button>`;
      return `<a href="#" onclick="${link.action.toString().includes('scroll') ? link.action.toString() : `navigate('${link.label.toLowerCase()}')`}" class="block text-gray-600 hover:text-blue-600 py-2">${link.label}</a>`;
    }).join('');
  }

  function scrollToServices() { document.getElementById('services')?.scrollIntoView({ behavior: 'smooth' }); }
  function scrollToTestimonials() { document.getElementById('testimonials')?.scrollIntoView({ behavior: 'smooth' }); }
  function scrollToContact() { document.getElementById('contact')?.scrollIntoView({ behavior: 'smooth' }); }

  async function renderContent() {
    const main = document.getElementById('mainContent');
    if (!main) return;

    if (currentPage === 'landing') {
      main.innerHTML = `
        <section class="bg-gradient-to-br from-blue-50 to-indigo-100 py-16 px-4">
          <div class="max-w-7xl mx-auto text-center">
            <div class="inline-flex items-center bg-blue-100 text-blue-800 rounded-full px-4 py-1 text-sm mb-4"><i class="fas fa-certificate mr-2"></i> Trusted by 500+ Students & Professionals</div>
            <h1 class="text-4xl md:text-5xl font-extrabold text-gray-800">Your Partner in <span class="text-blue-600">Academic Excellence</span><br>and IT Solutions</h1>
            <p class="text-gray-600 text-lg max-w-2xl mx-auto mt-4">Professional support for HESLB, RITA, NIDA, University Applications, Academic Work, and Technical IT Services. Fast, reliable, and 100% confidential.</p>
            <div class="mt-6 flex justify-center gap-4"><button onclick="openModal('register')" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-full shadow">Get Started <i class="fas fa-arrow-right ml-2"></i></button><a href="#services" class="border border-blue-600 text-blue-600 hover:bg-blue-50 font-semibold py-3 px-8 rounded-full">Explore Services</a></div>
            <div class="grid grid-cols-2 md:grid-cols-3 gap-6 mt-12 max-w-3xl mx-auto"><div><i class="fas fa-smile text-3xl text-blue-500"></i><p class="font-bold text-2xl">500+</p><p>Happy Clients</p></div><div><i class="fas fa-chart-line text-3xl text-blue-500"></i><p class="font-bold text-2xl">98%</p><p>Success Rate</p></div><div><i class="fas fa-clock text-3xl text-blue-500"></i><p class="font-bold text-2xl">24/7</p><p>Support Available</p></div></div>
          </div>
        </section>
        <section id="services" class="py-16 px-4 bg-white"><div class="max-w-7xl mx-auto text-center"><h2 class="text-3xl font-bold">What We Offer</h2><p class="text-gray-500 mt-2">Comprehensive academic & IT support services</p><div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 mt-10">${getServicesHTML()}</div></div></section>
        <section id="testimonials" class="py-16 px-4 bg-gray-50"><div class="max-w-7xl mx-auto text-center"><h2 class="text-3xl font-bold">What Our Clients Say</h2><p class="text-gray-500 mt-2">Trusted by students and professionals</p><div class="grid grid-cols-1 md:grid-cols-3 gap-8 mt-10">${getTestimonialsHTML()}</div></div></section>
        <section id="contact" class="py-16 px-4 bg-white"><div class="max-w-3xl mx-auto"><h2 class="text-3xl font-bold text-center">Contact Us</h2><p class="text-center text-gray-500 mt-2">We'll get back to you within 24h</p><form id="contactFormReal" class="bg-gray-50 p-8 rounded-2xl shadow-md mt-8"><div class="grid grid-cols-1 md:grid-cols-2 gap-6"><div><label class="block font-medium mb-2">Full Name</label><input type="text" id="contactName" class="w-full border rounded-lg px-4 py-2" required></div><div><label class="block font-medium mb-2">Email</label><input type="email" id="contactEmail" class="w-full border rounded-lg px-4 py-2" required></div></div><div class="mt-4"><label class="block font-medium mb-2">Message</label><textarea id="contactMessage" rows="4" class="w-full border rounded-lg px-4 py-2" required></textarea></div><button type="submit" class="mt-6 bg-blue-600 text-white py-2 px-6 rounded-full w-full hover:bg-blue-700">Send Message</button></form></div></section>
        <footer class="bg-gray-900 text-gray-300 py-8 px-4"><div class="max-w-7xl mx-auto text-center">&copy; 2026 Mr. Haule Services. Elimu na Maisha yako tunayasimamia kwa usalama kabisa.</div></footer>
      `;
      document.getElementById('contactFormReal')?.addEventListener('submit', handleContactSubmit);
    } else if (currentPage === 'home') {
      if (!currentUser) { navigate('landing'); return; }
      main.innerHTML = `
        <div class="max-w-7xl mx-auto py-12 px-4">
          <div class="bg-white rounded-2xl shadow-md p-8"><h1 class="text-3xl font-bold">Welcome, ${escapeHtml(currentUser.fullName)}!</h1><p class="text-gray-600 mt-2">Your partner in academic excellence and IT solutions.</p><button onclick="navigate('dashboard')" class="mt-4 bg-blue-600 text-white px-6 py-2 rounded-full">Go to Dashboard →</button></div>
        </div>
      `;
    } else if (currentPage === 'dashboard') {
      if (!currentUser) { navigate('landing'); return; }
      const uid = currentUser.uid;
      const requestsSnap = await db.ref(`requests/${uid}`).once('value');
      const requests = requestsSnap.val() ? Object.values(requestsSnap.val()) : [];
      main.innerHTML = `
        <div class="max-w-4xl mx-auto py-12 px-4">
          <div class="bg-white rounded-2xl shadow-md p-6"><h2 class="text-2xl font-bold mb-4">Place New Request</h2><form id="requestForm">${getRequestFormHTML()}</form></div>
          <div class="bg-white rounded-2xl shadow-md p-6 mt-6"><h2 class="text-2xl font-bold mb-4">Request History</h2><div id="historyList">${requests.length ? requests.map(req => `<div class="border-l-4 border-blue-500 bg-gray-50 p-3 mb-2 rounded"><strong>${escapeHtml(req.service)}</strong> - TSh ${req.amount}<br>Status: ${req.status || 'Pending'}<br>${new Date(req.timestamp).toLocaleString()}</div>`).join('') : '<p class="text-gray-500">No requests yet.</p>'}</div></div>
        </div>
      `;
      setupRequestForm();
    } else if (currentPage === 'payment') {
      if (!currentUser) { navigate('landing'); return; }
      main.innerHTML = `
        <div class="max-w-md mx-auto py-12 px-4">
          <div class="bg-white rounded-2xl shadow-md p-6"><h2 class="text-2xl font-bold mb-4">Make a Payment</h2><form id="paymentForm"><div class="mb-4"><label class="block font-medium mb-2">Amount (TSh)</label><input type="number" id="payAmount" class="w-full border rounded-lg px-4 py-2" required></div><div class="mb-4"><label class="block font-medium mb-2">Payment Method</label><div class="grid grid-cols-2 gap-2">${getPaymentMethodsHTML()}</div><input type="hidden" id="selectedMethod"></div><button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-full hover:bg-blue-700">Confirm Payment</button></form></div>
        </div>
      `;
      setupPaymentForm();
    } else if (currentPage === 'admin') {
      if (!currentUser || currentUser.email !== 'hamanierasmuce@gmail.com') { navigate('landing'); return; }
      const allRequestsSnap = await db.ref('allRequests').once('value');
      const requests = allRequestsSnap.val() ? Object.values(allRequestsSnap.val()) : [];
      const monthlySales = {};
      requests.forEach(r => { const m = new Date(r.timestamp).toLocaleDateString('en',{year:'numeric',month:'numeric'}); monthlySales[m] = (monthlySales[m] || 0) + r.amount; });
      let salesHtml = '<h3 class="font-bold mt-4">Sales Report</h3><ul>';
      for (const [m,total] of Object.entries(monthlySales)) salesHtml += `<li>${m}: TSh ${total.toLocaleString()}</li>`;
      salesHtml += '</ul>';
      main.innerHTML = `
        <div class="max-w-6xl mx-auto py-12 px-4">
          <div class="bg-white rounded-2xl shadow-md p-6"><h2 class="text-2xl font-bold mb-4">All Requests</h2><div id="adminRequests">${requests.map(r => `<div class="border p-3 mb-2 rounded"><strong>${escapeHtml(r.userName || r.userEmail)}</strong> - ${r.service}<br>Amount: TSh ${r.amount}<br>Status: <select class="status-select" data-email="${r.userEmail}" data-ts="${r.timestamp}"><option ${r.status==='Pending'?'selected':''}>Pending</option><option ${r.status==='Processing'?'selected':''}>Processing</option><option ${r.status==='Completed'?'selected':''}>Completed</option></select><br>${r.details ? `Details: ${r.details}<br>` : ''}</div>`).join('')}</div>${salesHtml}</div>
        </div>
      `;
      document.querySelectorAll('.status-select').forEach(sel => {
        sel.addEventListener('change', async (e) => {
          const newStatus = sel.value;
          const userEmail = sel.dataset.email;
          const timestamp = sel.dataset.ts;
          const all = (await db.ref('allRequests').once('value')).val() || {};
          const req = all[timestamp];
          if (req && req.userId) {
            await db.ref(`allRequests/${timestamp}`).update({ status: newStatus });
            await db.ref(`requests/${req.userId}/${timestamp}`).update({ status: newStatus });
            show3DToast('Status updated', 'fa-check-circle');
          }
        });
      });
    }
  }

  function getServicesHTML() {
    const services = [
      { icon: 'university', title: 'HESLB Support', desc: 'Loan applications, corrections, document verification, step‑by‑step guidance.' },
      { icon: 'id-card', title: 'RITA & NIDA', desc: 'Birth certificates, NIDA registration, tracking services.' },
      { icon: 'graduation-cap', title: 'University Applications', desc: 'Admission applications, course selection, university guidance.' },
      { icon: 'book-open', title: 'Academic Work', desc: 'Assignments, research, field reports, presentations, formal letters.' },
      { icon: 'laptop-code', title: 'IT Support', desc: 'Windows installation, virus removal, speed optimization, backup & restore.' },
      { icon: 'chalkboard-user', title: 'Consultation', desc: 'One‑on‑one guidance for academic and technical challenges.' }
    ];
    return services.map(s => `<div class="bg-gray-50 p-6 rounded-2xl shadow-sm hover:shadow-md"><i class="fas fa-${s.icon} text-3xl text-blue-600 mb-4"></i><h3 class="text-xl font-bold">${s.title}</h3><p class="text-gray-600 mt-2">${s.desc}</p></div>`).join('');
  }

  function getTestimonialsHTML() {
    const testimonials = [
      { name: 'Sarah M.', role: 'UDSM', text: 'Mr. Haule Services helped me successfully apply for HESLB loan.' },
      { name: 'James K.', role: 'IT Professional', text: 'Their IT support team fixed my laptop quickly.' },
      { name: 'Amina J.', role: 'Business Owner', text: 'Excellent support for NIDA registration.' }
    ];

  function openModal(type) {
    const modal = document.getElementById('modalBackdrop');
    const title = document.getElementById('modalTitle');
    const contentDiv = document.getElementById('modalContent');
    const footer = document.getElementById('modalFooterText');
    const errorDiv = document.getElementById('modalError');

      title.innerText = 'Login';
      contentDiv.innerHTML = `
        <div class="mb-4"><label class="block text-gray-700 mb-1">Email</label><input type="email" id="loginEmail" class="w-full border rounded-lg px-3 py-2" required></div>

        <div class="text-right mb-2"><a href="#" onclick="openModal('forgot'); return false;" class="text-sm text-blue-600">Forgot Password?</a></div>
      `;
      footer.innerHTML = `Don't have an account? <a href="#" onclick="openModal('register'); return false;" class="text-blue-600">Register</a>`;
    } else if (type === 'register') {
      title.innerText = 'Create Account';
      contentDiv.innerHTML = `
        <div class="mb-4"><label class="block text-gray-700 mb-1">Full Name</label><input type="text" id="regFullName" class="w-full border rounded-lg px-3 py-2" required></div>
        <div class="mb-4"><label class="block text-gray-700 mb-1">Email</label><input type="email" id="regEmail" class="w-full border rounded-lg px-3 py-2" required></div>
        <div class="mb-4"><label class="block text-gray-700 mb-1">Phone (+255...)</label><input type="tel" id="regPhone" class="w-full border rounded-lg px-3 py-2" required></div>
        <div class="mb-4"><label class="block text-gray-700 mb-1">Password</label><div style="position:relative;"><input type="password" id="regPassword" class="w-full border rounded-lg px-3 py-2" required><i class="fas fa-eye toggle-pw" style="position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer;" onclick="togglePassword('regPassword')"></i></div></div>
      `;
      footer.innerHTML = `Already have an account? <a href="#" onclick="openModal('login'); return false;" class="text-blue-600">Login</a>`;
    } else if (type === 'forgot') {
      title.innerText = 'Reset Password';
      contentDiv.innerHTML = `
        <div class="mb-4"><label class="block text-gray-700 mb-1">Email Address</label><input type="email" id="resetEmail" class="w-full border rounded-lg px-3 py-2" required></div>
        <div class="text-sm text-gray-500 mb-2">We'll send a password reset link to your email.</div>
      `;
      footer.innerHTML = `<a href="#" onclick="openModal('login'); return false;" class="text-blue-600">Back to Login</a>`;
    }
    modal.style.display = 'flex';
    const modalForm = document.getElementById('modalForm');
    modalForm.onsubmit = async (e) => {
      e.preventDefault();
      const errorDiv = document.getElementById('modalError');
      errorDiv.innerText = '';
      if (type === 'login') {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        try {
          await auth.signInWithEmailAndPassword(email, password);
          show3DToast('✅ Login successful!', 'fa-check-circle');
          closeModal();
          navigate('home');
        } catch (err) {
          errorDiv.innerText = err.message;
        }
      } else if (type === 'register') {
        const fullName = document.getElementById('regFullName').value.trim();
        const email = document.getElementById('regEmail').value.trim().toLowerCase();
        const phone = document.getElementById('regPhone').value.trim();
        const password = document.getElementById('regPassword').value;
        if (fullName.split(/\s+/).length < 2) { errorDiv.innerText = 'Full name must have at least two words'; return; }
        if (!/^[^\s@]+@([^\s@]+\.)+[^\s@]+$/.test(email)) { errorDiv.innerText = 'Invalid email'; return; }
        if (!/^\+255[0-9]{9}$/.test(phone)) { errorDiv.innerText = 'Phone must be +255XXXXXXXXX'; return; }
        if (password.length < 6) { errorDiv.innerText = 'Password must be at least 6 characters'; return; }
        try {
          const userCred = await auth.createUserWithEmailAndPassword(email, password);
          const uid = userCred.user.uid;
          await db.ref(`users/${uid}`).set({ fullName, email, phoneNumber: phone, role: 'user' });
          await userCred.user.updateProfile({ displayName: fullName });
          show3DToast('🎉 Registration successful! Please login.', 'fa-user-plus');
          closeModal();
        } catch (err) {
          errorDiv.innerText = err.message;
        }
      } else if (type === 'forgot') {
        const email = document.getElementById('resetEmail').value.trim();
        if (!email) { errorDiv.innerText = 'Please enter your email'; return; }
        try {
          await auth.sendPasswordResetEmail(email);
          show3DToast('📧 Password reset email sent! Check your inbox.', 'fa-envelope');
          closeModal();
        } catch (err) {
          errorDiv.innerText = err.message;
        }
      }
    };
  }

  function getAIResponse(msg) {

    if (msg.includes('assignment') || msg.includes('research') || msg.includes('academic')) return "Academic Work: Assignments, research, field reports, presentations. Starts at TSh 500/page.";
    if (msg.includes('it') || msg.includes('windows') || msg.includes('virus')) return "IT Support: Windows installation (TSh 10,000), antivirus (TSh 5,000), speed optimization, backup.";
    return "Thank you for your message! Please ask about HESLB, RITA, NIDA, University, IT Support, or payment methods. Visit Dashboard to place a request.";

  function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
