<script type="module">
  import * as THREE from 'three';
  // ========== THREE.JS BACKGROUND (3D) ==========
  const canvas = document.getElementById('bg-canvas');
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 0);
  canvas.appendChild(renderer.domElement);
  const particlesGeometry = new THREE.BufferGeometry();
  const particlesCount = 2000;
  const posArray = new Float32Array(particlesCount * 3);
  const colorArray = new Float32Array(particlesCount * 3);
  for (let i = 0; i < particlesCount; i++) {
    posArray[i*3] = (Math.random() - 0.5) * 40;
    posArray[i*3+1] = (Math.random() - 0.5) * 20;
    posArray[i*3+2] = (Math.random() - 0.5) * 30 - 10;
    const colors = [[0.12,0.55,0.33], [0.95,0.69,0.13], [0.13,0.54,0.82], [0.2,0.2,0.2]];
    const col = colors[Math.floor(Math.random() * colors.length)];
    colorArray[i*3] = col[0];
    colorArray[i*3+1] = col[1];
    colorArray[i*3+2] = col[2];
  }
  particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
  particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));
  const particlesMaterial = new THREE.PointsMaterial({ size: 0.1, vertexColors: true, transparent: true, opacity: 0.7 });
  const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
  scene.add(particlesMesh);
  const sphereGeo = new THREE.SphereGeometry(1.5, 32, 32);
  const sphereMat = new THREE.MeshStandardMaterial({ color: 0x3b82f6, emissive: 0x1e3a8a, roughness: 0.3, metalness: 0.7 });
  const sphere = new THREE.Mesh(sphereGeo, sphereMat);
  scene.add(sphere);
  const ambientLight = new THREE.AmbientLight(0x404060);
  scene.add(ambientLight);
  const pointLight = new THREE.PointLight(0xffaa33, 1);
  pointLight.position.set(5,5,5);
  scene.add(pointLight);
  const pointLight2 = new THREE.PointLight(0x33ffaa, 0.8);
  pointLight2.position.set(-3,2,4);
  scene.add(pointLight2);
  camera.position.z = 8;
  camera.position.y = 2;
  function animate() {
    requestAnimationFrame(animate);
    particlesMesh.rotation.y += 0.0005;
    particlesMesh.rotation.x += 0.0003;
    sphere.rotation.x += 0.005;
    sphere.rotation.y += 0.007;
    camera.position.x = Math.sin(Date.now() * 0.0005) * 1;
    camera.lookAt(0,0,0);
    renderer.render(scene, camera);
  }
  animate();
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>

          if (req && req.userId) await db.ref(`requests/${req.userId}/${requestId}`).update({ status: newStatus });
          alert('Status updated');
        });
      });
    }
  }

  auth.onAuthStateChanged((user) => {
    if (user) {
      currentUser = user;
      db.ref(`users/${user.uid}`).once('value').then(snap => {
        const data = snap.val();
        if (data) { currentUser.displayName = data.fullName || user.displayName; currentUser.phoneNumber = data.phoneNumber; }
        if (currentPage === 'landing' || currentPage === 'login' || currentPage === 'register') navigate('home');
        else render();
      });
    } else {
      currentUser = null;
      if (currentPage !== 'landing' && currentPage !== 'login' && currentPage !== 'register' && currentPage !== 'forgot') navigate('landing');
      else render();
    }
  });

  document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', () => setLanguage(btn.dataset.lang)));
  setLanguage('en');
  window.togglePw = togglePw;
  window.navigate = navigate;
  window.logout = logout;
</script>
</body>
</html>
