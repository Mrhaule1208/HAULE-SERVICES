<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mr Haule Services</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-900 to-blue-500 h-screen flex items-center justify-center">

<div class="bg-white p-8 rounded-xl shadow-xl w-80">

<h2 class="text-2xl font-bold mb-4 text-center">Login</h2>

<input id="email" placeholder="Email" class="border p-2 w-full mb-3 rounded">
<input id="pass" type="password" placeholder="Password" class="border p-2 w-full mb-4 rounded">

<button onclick="login()" class="bg-blue-600 text-white w-full py-2 rounded mb-2">Login</button>
<button onclick="register()" class="bg-green-600 text-white w-full py-2 rounded">Register</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
import { getDatabase, ref, set, get } 
from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

const app = initializeApp({
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
databaseURL:"YOUR_DB"
});

const auth = getAuth(app);
const db = getDatabase(app);

window.register = async () => {

const user = await createUserWithEmailAndPassword(auth,email.value,pass.value);

await set(ref(db,`users/${user.user.uid}`),{
role:"user"
});

alert("Account created");

};

window.login = async () => {

const user = await signInWithEmailAndPassword(auth,email.value,pass.value);

const snap = await get(ref(db,`users/${user.user.uid}`));

if(snap.val().role === "admin"){
location.href="admin.html";
}else{
location.href="dashboard.html";
}

};

</script>
</body>
</html>
